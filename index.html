<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itzak's selection</title>
<style>
:root {
  --bg: #f0f2f5; --surface: #fff; --card: #fff;
  --text: #222; --muted: #666; --accent: #4a6cf7;
  --badge: #e8ecf4; --border: #ddd; --hover: #f0f2f8;
  --shadow: 0 2px 8px rgba(0,0,0,.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  transition: background .3s, color .3s;
}
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 1.2rem; font-weight: 700; cursor: pointer; }
.header-right { display: flex; align-items: center; gap: 12px; }
.theme-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.status-dot.ok { background: #4caf50; }
.status-dot.loading { background: #ff9800; animation: pulse 1s infinite; }
.status-dot.error { background: #f44336; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.header-menu { position: relative; }
.header-dropdown {
  display: none; position: absolute; right: 0; top: 100%; margin-top: 4px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,.12); min-width: 160px; padding: 4px; z-index: 150;
}
.header-dropdown.open { display: block; }
.header-dropdown button {
  display: block; width: 100%; padding: 8px 12px; border: none; border-radius: 6px;
  background: none; color: var(--text); font-size: .82rem; cursor: pointer; text-align: left;
}
.header-dropdown button:hover { background: var(--hover); }

.user-icon { display:inline-block; width:1em; height:1em; vertical-align:middle; position:relative }
.user-icon::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:.4em; height:.4em; border-radius:50%; border:1.5px solid var(--text)
}
.user-icon::after {
  content:''; position:absolute; top:.5em; left:50%; transform:translateX(-50%);
  width:.8em; height:.45em; border-radius:.25em .25em 0 0; border:1.5px solid var(--text); border-bottom:none
}

.tabs { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 24px; }
.tab {
  padding: 12px 24px; cursor: pointer; border: none; background: none;
  color: var(--muted); font-size: .9rem; font-weight: 500;
  border-bottom: 2px solid transparent; transition: all .2s;
}
.tab.active { color: var(--text); border-bottom-color: var(--text); }
.tab:hover { color: var(--text); }

main { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center;
}
.filter-chip {
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--badge); color: var(--muted); cursor: pointer;
  font-size: .8rem; white-space: nowrap; transition: all .2s;
}
.filter-chip:hover { border-color: var(--accent); color: var(--text); }
.filter-chip.active { background: var(--surface); color: var(--text); border-color: var(--text); }
.search-box {
  margin-left: auto; padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: .85rem; width: 220px;
  outline: none; transition: border-color .2s;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--muted); }

.banner {
  padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; font-size: .82rem;
  display: flex; align-items: center; gap: 8px;
}
.banner.warn { background: #3a2e1b; color: #ffb74d; border: 1px solid #5a4a2a; }

.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}
.card {
  background: var(--card); border-radius: 12px; overflow: hidden;
  box-shadow: var(--shadow); cursor: pointer; transition: transform .2s, box-shadow .2s;
  border: 1px solid var(--border);
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.3); }
.card-img {
  width: 100%; height: 320px; object-fit: cover; background: var(--badge);
  display: flex; align-items: center; justify-content: center;
}
.card-img.placeholder {
  background: linear-gradient(135deg, var(--badge), var(--surface));
  color: var(--muted); font-size: .85rem; text-align: center; padding: 16px;
}
.card-body { padding: 14px; }
.card-title { font-weight: 600; font-size: .95rem; margin-bottom: 4px; line-height: 1.3; }
.card-sub { font-size: .8rem; color: var(--muted); margin-bottom: 8px; }
.card-badges { display: flex; flex-wrap: wrap; gap: 4px; }
.badge {
  padding: 3px 8px; border-radius: 4px; font-size: .7rem; font-weight: 500;
  background: var(--badge); color: var(--accent);
}
.card-fav, .card-watched {
  position: absolute; right: 8px; width: 28px; height: 28px;
  border-radius: 50%; background: rgba(0,0,0,.5); border: none; color: #fff;
  cursor: pointer; font-size: .85rem; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s;
}
.card-fav { top: 8px; }
.card-watched { top: 40px; }
.card:hover .card-fav, .card:hover .card-watched { opacity: 1; }
.card-fav.saved { opacity: 1; color: #ffd700; }
.card-watched.done { opacity: 1; color: #4caf50; }

.empty-state {
  text-align: center; padding: 60px 20px; color: var(--muted);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { margin-bottom: 4px; }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: var(--surface); border-radius: 16px; max-width: 640px; width: 100%;
  max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,.5);
}
.modal-close {
  float: right; margin: 12px; width: 32px; height: 32px; border-radius: 50%;
  border: none; background: var(--badge); color: var(--text); cursor: pointer;
  font-size: 1.1rem;
}
.modal-img { width: 100%; max-height: 400px; object-fit: cover; }
.modal-body { padding: 24px; }
.modal-body h2 { font-size: 1.3rem; margin-bottom: 6px; }
.modal-body .meta { color: var(--muted); font-size: .85rem; margin-bottom: 12px; }
.modal-body .summary { font-size: .9rem; line-height: 1.6; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; }
.btn {
  padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--badge); color: var(--text); cursor: pointer; font-size: .85rem;
  transition: all .2s;
}
.btn:hover { border-color: var(--accent); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.external { background: transparent; color: var(--accent); border-color: var(--accent); }

.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  padding: 60px 20px; color: var(--muted); font-size: .9rem;
}

footer {
  text-align: center; padding: 24px; color: var(--muted); font-size: .75rem;
  border-top: 1px solid var(--border);
}
footer a { color: var(--muted); text-decoration: underline; cursor: pointer; }
footer a:hover { color: var(--text); }
footer a { color: var(--muted); text-decoration: underline; cursor: pointer; }
footer a:hover { color: var(--text); }

@media (max-width: 768px) {
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .card-img { height: 220px; }
  .card-body { padding: 10px; }
  .card-title { font-size: .85rem; }
  .filter-bar { gap: 6px; }
  header { padding: 12px 16px; }
  main { padding: 12px 16px; }
  .search-box { width: 150px; }
}
</style>
</head>

<script>

var debugEl, debugLines = [];

  if (debugEl) debugEl.textContent = debugLines.join('\n');

(function checkVersion(){
  var v = localStorage.getItem('mbr_version');
  if (v !== VERSION) {
    var keys = [];
    for (var i = 0; i < localStorage.length; i++) {

    }
    for (var j = 0; j < keys.length; j++) localStorage.removeItem(keys[j]);
    localStorage.setItem('mbr_version', VERSION);

})();

// ===== CACHE =====
function cacheGet(k) {
  try {
    var e = JSON.parse(localStorage.getItem('mbr_' + k));
    if (!e || !e.data) return null;
    return e.data;
  } catch(x) { return null; }
}
function cacheSet(k, data, ttl) {
  try { localStorage.setItem('mbr_' + k, JSON.stringify({data:data, ts:Date.now(), ttl:ttl})); } catch(x) {}
}

// ===== INCREMENTAL UPDATE =====
function normWikiTitle(t) {
  return decodeURIComponent(t).replace(/_/g, ' ');
}

async function batchCheckRevisions(pageNames) {
  var titles = pageNames.join('%7C');
  var url = 'https://en.wikipedia.org/w/api.php?origin=*&action=query&prop=revisions&format=json&titles=' + titles;
  try {
    var r = await fetch(url);
    var d = await r.json();
    if (d.error) {
      debug('revision check API error: ' + (d.error.info || JSON.stringify(d.error)));
      return null;
    }
    var revMap = {};
    var pages = d.query.pages;
    for (var pid in pages) {
      var p = pages[pid];
      if (p.revisions && p.revisions[0]) {
        revMap[normWikiTitle(p.title)] = p.revisions[0].revid;
      }
    }
    debug('revision check: ' + Object.keys(revMap).length + ' pages, ' + pageNames.length + ' expected');
    return revMap;
  } catch(e) {
    debug('revision check failed: ' + e.message);
    return null;
  }
}

// ===== WIKIPEDIA AWARD PARSER =====
async function fetchWikiPage(pageName) {
  var url = "https://en.wikipedia.org/w/api.php?origin=*&action=parse&page=" + pageName + "&prop=text&format=json";
  var r = await fetch(url); var d = await r.json();
  return d.parse.text["*"];
}

function cleanText(s) { return s.replace(/\[.*?\]/g,"").replace(/[§*]/g,"").trim(); }
function cleanFilmText(s) {
  s = s.replace(/\[.*?\]/g,"").replace(/[§*]/g,"").trim();
  s = s.replace(/\s*\(\d{4}[^)]*\)/g,"");
  var parts = s.split(/  +|\t|, ·| · \d{4}|,\s*\d{4}/);
  return parts[0].trim();
}

function parseAwardsTable(html) {
  var doc = new DOMParser().parseFromString(html, "text/html");
  var tables = doc.querySelectorAll("table.wikitable, table.sortable, table");
  var all = [];
  for (var t = 0; t < tables.length; t++) {
    var rows = tables[t].querySelectorAll("tr");
    if (rows.length < 2) continue;
    var firstDataCells = rows[1] ? rows[1].querySelectorAll("td,th") : null;
    if (!firstDataCells || firstDataCells.length < 1) continue;
    var testYear = firstDataCells[0].textContent.replace(/\[.*?\]/g,"").trim();
    var yearMatch = testYear.match(/^(\d{4})/);
    if (!yearMatch || parseInt(yearMatch[1]) < 1990) continue;

    var headerCells = rows[0].querySelectorAll("th");
    var headers = [];
    for (var h = 0; h < headerCells.length; h++) headers.push(headerCells[h].textContent.trim().toLowerCase());
    if (headers.length < 2) continue; // skip navboxes and other non-data tables

    var filmCol = -1, winnerCol = -1;
    for (var c = 0; c < headers.length; c++) {
      var ht = headers[c];
      if (ht.indexOf("english") >= 0) filmCol = c;
      if (ht === "film") filmCol = c;
      if (filmCol < 0 && ht.indexOf("film") >= 0 && ht.indexOf("year") < 0) filmCol = c;
      if (filmCol < 0 && ht.indexOf("title") >= 0 && ht.indexOf("original") < 0) filmCol = c;
      if (winnerCol < 0 && (ht.indexOf("director") >= 0 || ht.indexOf("réalisateur") >= 0)) winnerCol = c;
      if (winnerCol < 0 && (ht.indexOf("actor") >= 0 || ht.indexOf("actress") >= 0)) winnerCol = c;
      if (winnerCol < 0 && (ht.indexOf("winner") >= 0 || ht.indexOf("recipient") >= 0)) winnerCol = c;
    }
    if (filmCol < 0) filmCol = (headers.length >= 3 ? 2 : 1);
    if (winnerCol < 0) winnerCol = 1;

    // Detect Oscar-style tables with background winner marking
    // Require 2+ background rows to avoid false positives from single special rows (e.g. COVID cancellation)
    var hasWinnerBg = false;
    var bgRowCount = 0;
    for (var scan = 1; scan < Math.min(10, rows.length); scan++) {
      var scanRow = rows[scan]; if (!scanRow) continue;
      var scanCells = scanRow.querySelectorAll("td,th");
      for (var sc = 0; sc < scanCells.length; sc++) {
        if ((scanCells[sc].getAttribute("style")||"").indexOf("background") >= 0) { bgRowCount++; break; }
      }
    }
    hasWinnerBg = (bgRowCount >= 2);

    var prevYear = "", prevRowspan = 0;
    for (var r = 1; r < rows.length; r++) {
      var rowEl = rows[r];
      var cells = rowEl.querySelectorAll("td,th");
      if (cells.length < 2) continue;
      if (hasWinnerBg) {
        var isWinner = (rowEl.getAttribute("style")||"").indexOf("background") >= 0;
        if (!isWinner) {
          for (var ci = 0; ci < cells.length; ci++) {
            if ((cells[ci].getAttribute("style")||"").indexOf("background") >= 0) { isWinner = true; break; }
          }
        }
        if (!isWinner) continue;
      }
      var first = cells[0].textContent.replace(/\[.*?\]/g,"").trim();
      var thisRowspan = parseInt(cells[0].getAttribute("rowspan") || "0");
      var ym = first.match(/^(\d{4})/);
      var shift = 0, year;
      if (ym && parseInt(ym[1]) >= 1990) { year = ym[1]; prevYear = year; prevRowspan = thisRowspan; }
      else if (prevYear) {
        if (prevRowspan >= 3) continue;
        year = prevYear; shift = 1;
      }
      else continue;

      var fi = filmCol - shift, wi = winnerCol - shift;
      if (fi < 0) fi = 0; if (wi < 0) wi = 0;

      var filmCell = (fi < cells.length) ? cells[fi] : null;
      var film = filmCell ? cleanFilmText(filmCell.textContent) : "";
      var winner = (wi < cells.length) ? cleanText(cells[wi].textContent) : "";
      if (!film) continue;

      var wpTitle = null;
      if (filmCell) {
        var link = filmCell.querySelector("a[href^=\"/wiki/\"]");
        if (link) wpTitle = decodeURIComponent(link.getAttribute("href").replace("/wiki/",""));
      }
      all.push({title: film, creator: winner, year: year, source: "", award: "", wikiTitle: wpTitle, thumb: null});
    }
  }
  return all;
}

function parseBookTable(html, cfg) {
  var doc = new DOMParser().parseFromString(html, "text/html");
  var tables = doc.querySelectorAll("table.wikitable, table.sortable, table");
  var all = [];
  debug('parseBookTable: found ' + tables.length + ' wikitables');
  for (var t = 0; t < tables.length; t++) {
    var rows = tables[t].querySelectorAll("tr");
    if (rows.length < 2) continue;
    var headerCells = rows[0].querySelectorAll("th");
    var headers = [], headerImgs = [], colSpans = [];
    for (var h = 0; h < headerCells.length; h++) {
      headers.push(headerCells[h].textContent.trim().toLowerCase());
      headerImgs.push(headerCells[h].querySelector("img") !== null);
      colSpans.push(parseInt(headerCells[h].getAttribute("colspan") || "1"));
    }
    // Check for sub-header row (multi-level headers like Nobel)
    var subHeaders = [];
    if (rows.length > 1) {
      var row1Cells = rows[1].querySelectorAll("th");
      if (row1Cells.length > 0) {
        for (var sh = 0; sh < row1Cells.length; sh++) {
          subHeaders.push(row1Cells[sh].textContent.trim().toLowerCase());
        }
      }
    }
    var yearCol = cfg.yearCol, authorCol = cfg.authorCol, titleCol = cfg.titleCol;
    if (cfg.subAuthor && subHeaders.length > 0) {
      for (var sc = 0; sc < subHeaders.length; sc++) {
        if (subHeaders[sc] === "name") { authorCol = yearCol + 1 + sc; break; }
      }
    }
    if (titleCol < 0) {
      for (var c = 0; c < headers.length; c++) {
        var ht = headers[c];
        if (!headerImgs[c] && c !== authorCol && (ht === "title" || ht === "work" || ht === "novel" || ht === "book")) { titleCol = c; break; }
      }
    }
    if (headers.length > 0 && yearCol < headers.length && headers[yearCol].indexOf("year") < 0) continue;
    debug('  table[' + t + ']: headers=' + headers.join('|') + ' yearCol=' + yearCol + ' authorCol=' + authorCol + ' titleCol=' + titleCol);
    var rowCount = 0, skippedYear = 0, skippedEmpty = 0;
    var pendingYear = '', pendingRowspan = 0;
    for (var r = 1; r < rows.length; r++) {
      var cells = rows[r].querySelectorAll("td,th");
      if (cfg.rowspanYear && cells.length === 1 && cells[0].tagName === 'TH') {
        var thText = cells[0].textContent.replace(/\[.*?\]/g,"").trim();
        var thYm = thText.match(/^(\d{4})/);
        if (thYm && parseInt(thYm[1]) >= 1990) {
          pendingYear = thYm[1];
          pendingRowspan = parseInt(cells[0].getAttribute("rowspan") || "1");
        }
        continue;
      }
      if (cells.length < 2) continue;
      var yearText;
      if (pendingYear && pendingRowspan > 0) {
        yearText = pendingYear;
        pendingRowspan--;
        if (pendingRowspan <= 0) pendingYear = '';
      } else {
        yearText = (cells[yearCol] || cells[0]).textContent.replace(/\[.*?\]/g,"").trim();
      }
      var ym = yearText.match(/^(\d{4})/);
      if (!ym || parseInt(ym[1]) < 1990) { skippedYear++; continue; }
      var year = ym[1];
      // When year comes from rowspan, columns are shifted left by 1
      var effAuthorCol = (pendingYear && pendingRowspan > 0) ? authorCol - 1 : authorCol;
      var effTitleCol = (pendingYear && pendingRowspan > 0) ? titleCol - 1 : titleCol;
      var author = effAuthorCol >= 0 && cells[effAuthorCol] ? cleanText(cells[effAuthorCol].textContent) : "";
      var title = "";
      if (effTitleCol >= 0 && cells[effTitleCol] && effTitleCol !== effAuthorCol) {
        if (!cells[effTitleCol].querySelector("img")) {
          title = cleanText(cells[effTitleCol].textContent);
        }
      }
      // If titleCol has images (flags), search other columns for title/work
      // If titleCol has images (flags), don't search alternatives — treat as person below
      // Winner background detection (NBA-style)
      if (cfg.winnerBg) {
        var rowIsWinner = (rows[r].getAttribute("style")||"").indexOf("background") >= 0;
        if (!rowIsWinner) {
          for (var wc = 0; wc < cells.length; wc++) {
            if ((cells[wc].getAttribute("style")||"").indexOf("background") >= 0) { rowIsWinner = true; break; }
          }
        }
        if (!rowIsWinner) { skippedEmpty++; continue; }
      }
      if (!author && !title) { skippedEmpty++; continue; }
      // If no title found but author exists, treat as person entry
      var linkFromAuthor = false;
      if (!title && author) { title = author; author = ''; linkFromAuthor = true; }
      var wpTitle = null;
      var linkCell;
      if (linkFromAuthor) { linkCell = effAuthorCol >= 0 && cells[effAuthorCol] ? cells[effAuthorCol] : null; }
      else { linkCell = title && effTitleCol >= 0 && cells[effTitleCol] ? cells[effTitleCol] : (effAuthorCol >= 0 ? cells[effAuthorCol] : null); }
      if (linkCell) {
        var link = linkCell.querySelector("a[href^=\"/wiki/\"]");
        if (link) wpTitle = decodeURIComponent(link.getAttribute("href").replace("/wiki/",""));
      }
      all.push({title: title, creator: author, year: year, source: "", award: "", wikiTitle: wpTitle, thumb: null});
      rowCount++;
    }
    debug('  table[' + t + ']: rows=' + rowCount + ' (skipped: year=' + skippedYear + ' empty=' + skippedEmpty + ')');
  }
  debug('parseBookTable: total=' + all.length + ' items');
  return all;
}

async function getWikiPoster(wpTitle) {
  if (!wpTitle) return null;
  try {
    var r = await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(wpTitle));
    if (r.ok) { var d = await r.json(); if (d.thumbnail) return d.thumbnail.source; }
    return null;
  } catch(e) { return null; }
}

var tmdbQueue = Promise.resolve();
async function getTmdbPoster(title, year) {
  if (!title || !year) return null;
  var ck = 'tmdb_' + title.toLowerCase().replace(/[^a-z0-9]/g,'') + '_' + year;
  var cached = cacheGet(ck);
  if (cached !== null) return cached;
  // Throttle TMDb calls to avoid rate limiting
  tmdbQueue = tmdbQueue.then(function(){ return new Promise(function(rs){ setTimeout(rs, 200); }); });
  await tmdbQueue;
  try {
    var r = await fetch("https://api.themoviedb.org/3/search/movie?api_key=" + TMDB_KEY + "&query=" + encodeURIComponent(title) + "&year=" + year);
    if (!r.ok) return null;
    var d = await r.json();
    var poster = null;
    if (d.results && d.results.length > 0) {
      // Prefer exact title match
      for (var i = 0; i < d.results.length; i++) {
        var rTitle = (d.results[i].title || '').toLowerCase();
        if (rTitle === title.toLowerCase() && d.results[i].poster_path) {
          poster = "https://image.tmdb.org/t/p/w342" + d.results[i].poster_path;
          break;
        }
      }
      // Fallback: first result with poster
      if (!poster) {
        for (var j = 0; j < d.results.length; j++) {
          if (d.results[j].poster_path) {
            poster = "https://image.tmdb.org/t/p/w342" + d.results[j].poster_path;
            break;
          }
        }
      }
    }
    cacheSet(ck, poster, 7776000000); // 90d TTL
    return poster;
  } catch(e) { return null; }
}

async function fetchMovieAwards() {
  var pageNames = MOVIE_PAGES.map(function(p) { return p.page; });
  var revs = await batchCheckRevisions(pageNames);
  var allItems = [];
  var skipped = 0, fetched = 0;
  for (var i = 0; i < MOVIE_PAGES.length; i++) {
    var p = MOVIE_PAGES[i];
    var cacheKey = 'page_mov_' + p.page;
    var cached = cacheGet(cacheKey);
    var nTitle = normWikiTitle(p.page);
    var currentRev = revs ? revs[nTitle] : undefined;
    var needFetch = !cached || (currentRev && cached.revId !== currentRev);

    if (needFetch) {
      debug("Wiki fetch: " + p.src + " " + p.award + (cached ? ' (changed)' : ''));
      try {
        var html = await fetchWikiPage(p.page);
        var rows = parseAwardsTable(html);
        for (var j = 0; j < rows.length; j++) {
          rows[j].source = p.src;
          rows[j].award = p.award;
          rows[j]._type = "movies";
        }
        cacheSet(cacheKey, {items: rows, revId: currentRev || 0});
        allItems = allItems.concat(rows);
        fetched++;
        debug("  -> " + rows.length + " items");
      } catch(e) {
        debug("  -> ERROR: " + e.message);
        if (cached) { allItems = allItems.concat(cached.items); }
      }
    } else {
      skipped++;
      allItems = allItems.concat(cached.items);
    }
  }
  debug('movies: ' + fetched + ' fetched, ' + skipped + ' skipped');
  return allItems;
}

function getWikiSummary(title) {
  if (!title) return Promise.resolve(null);
  return fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(title))
    .then(function(r){ return r.ok ? r.json() : null; })
    .catch(function(){ return null; });
}

// ===== WIKIPEDIA ENRICH =====
async function enrich(items) {
  var cacheKey = 'wiki_enrich';
  var cached = cacheGet(cacheKey);
  var enrichMap = cached || {};

  // Get titles needing enrichment
  var toEnrich = [];
  for (var i = 0; i < items.length; i++) {
    var title = items[i].wikiTitle;
    if (title && !enrichMap[title]) toEnrich.push(title);
  }

  // Fetch in batches
  var batchSize = 6;
  for (var j = 0; j < toEnrich.length; j += batchSize) {
    var batch = toEnrich.slice(j, j + batchSize);
    var results = await Promise.all(batch.map(function(t){
      return getWikiSummary(t).then(function(d){
        if (d && d.extract) {
          enrichMap[t] = { extract: d.extract, thumb: d.thumbnail ? d.thumbnail.source : null, orig: d.originalimage ? d.originalimage.source : null };
        } else {
          enrichMap[t] = null;
        }
      }).catch(function(){ enrichMap[t] = null; });
    }));
  }

  cacheSet(cacheKey, enrichMap, 604800000); // 7d TTL

  for (var k = 0; k < items.length; k++) {
    var t = items[k].wikiTitle;
    if (t && enrichMap[t]) {
      items[k].extract = enrichMap[t].extract;
      if (enrichMap[t].thumb) items[k].thumbnail = enrichMap[t].thumb;
      if (enrichMap[t].orig) items[k].originalimage = enrichMap[t].orig;
    }
  }
  return items;
}

// ===== MERGE/DEDUP =====
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function normTitle(t) { return (t||'').toLowerCase().replace(/\([^)]*\)/g,'').replace(/[^a-z0-9一-鿿]/g,'').trim(); }

function mergeFilms(items) {
  var groups = {};
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var key = normTitle(it.title); // title only, cross-year dedup
    if (!key) continue;
    if (!groups[key]) {
      groups[key] = {
        title: it.title, creator: it.creator,
        year: it.year, // display year (latest)
        years: {},
        wikiUrl: it.wikiUrl, wikiTitle: it.wikiTitle,
        thumbnail: it.thumbnail, originalimage: it.originalimage, extract: it.extract,
        _type: it._type,
        awards: []
      };
    }
    // Merge better data
    if (!groups[key].thumbnail && it.thumbnail) groups[key].thumbnail = it.thumbnail;
    if (!groups[key].originalimage && it.originalimage) groups[key].originalimage = it.originalimage;
    if (!groups[key].extract && it.extract) groups[key].extract = it.extract;
    if (!groups[key].wikiTitle && it.wikiTitle) groups[key].wikiTitle = it.wikiTitle;
    if (!groups[key].wikiUrl && it.wikiUrl) groups[key].wikiUrl = it.wikiUrl;
    if (it.title && groups[key].title.length < it.title.length) groups[key].title = it.title;
    // Track years
    if (it.year) groups[key].years[it.year] = 1;
    // Keep latest year for display
    if (it.year && (!groups[key].year || it.year > groups[key].year)) groups[key].year = it.year;
    // Collect awards with year
    if (it.award) {
      var dup = false;
      for (var j = 0; j < groups[key].awards.length; j++) {
        if (groups[key].awards[j].source === it.source && groups[key].awards[j].award === it.award) { dup = true; break; }
      }
      if (!dup) groups[key].awards.push({source: it.source, award: it.award, year: it.year});
    }
  }
  var merged = [];
  var gkeys = Object.keys(groups);
  for (var k = 0; k < gkeys.length; k++) {
    var g = groups[gkeys[k]];
    g.yearList = Object.keys(g.years).sort(function(a,b){ return b.localeCompare(a); });
    merged.push(g);
  }
  merged.sort(function(a,b){ return (b.year||'').localeCompare(a.year||''); });
  return merged;
}

// ===== FETCH ALL =====
async function fetchAll(type) {
  var allItems = [];
  var failures = 0;

  if (type === 'movies') {
    allItems = await fetchMovieAwards();
    // Load posters for items with wikiTitle (with per-item cache)
    var posterOk = 0, totalWithTitle = 0, posterCached = 0;
    for (var i = 0; i < allItems.length; i++) { if (allItems[i].wikiTitle) totalWithTitle++; }
    for (var i = 0; i < allItems.length; i += 6) {
      var batch = allItems.slice(i, i + 6);
      await Promise.all(batch.map(async function(item) {
        if (item.wikiTitle) {
          var pc = cacheGet('poster_' + item.wikiTitle);
          if (pc) { item.thumbnail = pc; posterOk++; posterCached++; return; }
          item.thumbnail = await getWikiPoster(item.wikiTitle);
          if (!item.thumbnail) item.thumbnail = await getTmdbPoster(item.title, item.year);
          if (item.thumbnail) { posterOk++; cacheSet('poster_' + item.wikiTitle, item.thumbnail, 604800000); }
        }
      }));
      if (i % 60 === 0 || i + 6 >= allItems.length) debug(type + ': posters ' + Math.min(i + 6, allItems.length) + '/' + allItems.length);
    }
    debug(type + ': posters found ' + posterOk + '/' + allItems.length + ' (' + posterCached + ' cached)');
  } else {
    allItems = await fetchBookAwards();
    // Load posters for book items with wikiTitle (with per-item cache)
    var posterOk = 0, totalWithTitle = 0, posterCached = 0;
    for (var i = 0; i < allItems.length; i++) { if (allItems[i].wikiTitle) totalWithTitle++; }
    for (var i = 0; i < allItems.length; i += 6) {
      var batch = allItems.slice(i, i + 6);
      await Promise.all(batch.map(async function(item) {
        if (item.wikiTitle) {
          var pc = cacheGet('poster_' + item.wikiTitle);
          if (pc) { item.thumbnail = pc; posterOk++; posterCached++; return; }
          item.thumbnail = await getWikiPoster(item.wikiTitle);
          if (item.thumbnail) { posterOk++; cacheSet('poster_' + item.wikiTitle, item.thumbnail, 604800000); }
        }
      }));
    }
    debug(type + ': posters found ' + posterOk + '/' + allItems.length + ' (' + posterCached + ' cached)');
  }

  // Merge/dedup films by title
  if (type === 'movies') {
    allItems = mergeFilms(allItems);
  } else {
    // Sort books newest first
    allItems.sort(function(a,b){ return (b.year||'').localeCompare(a.year||''); });
  }

  // Try enrich from Wikipedia (non-blocking)
  if (allItems.length > 0) { try { await enrich(allItems); } catch(e) {} }

  return { items: allItems, failures: failures, _count: allItems.length };
}

// ===== UI STATE =====
var state = { tab: 'movies', items: [], sourceFilter: 'all', yearFilter: 'all', search: '', loading: true, error: false, cacheAge: '', defaultLimit: 10, listFilter: 'all' };
var favorites = {};
try { favorites = JSON.parse(localStorage.getItem('mbr_favorites') || '{}'); } catch(e) {}
var watched = {};
try { watched = JSON.parse(localStorage.getItem('mbr_watched') || '{}'); } catch(e) {}

function saveFavs() { localStorage.setItem('mbr_favorites', JSON.stringify(favorites)); }
function saveWatched() { localStorage.setItem('mbr_watched', JSON.stringify(watched)); }
function toggleFav(id) { favorites[id] = !favorites[id]; saveFavs(); renderCards(); }
function toggleWatched(id) { watched[id] = !watched[id]; saveWatched(); renderCards(); }

function getItemId(item) { return (item._type||'') + '_' + (item.title||item.creator||'') + '_' + item.year; }

// ===== RENDER =====
function render() {
  var dot = document.getElementById('gear-dot');
  var st = document.getElementById('gear-status');
  if (dot && st) {
    dot.className = 'status-dot ' + (state.loading ? 'loading' : (state.error ? 'error' : 'ok'));
    st.textContent = state.loading ? 'Loading...' : (state.error ? 'Partial error' : 'Ready' + (state.cacheAge ? ' · ' + state.cacheAge : ''));
  }
  // Update user menu counts
  var sc = document.getElementById('saved-count');
  var wc = document.getElementById('watched-count');
  if (sc) sc.textContent = '(' + Object.keys(favorites).filter(function(k){ return favorites[k]; }).length + ')';
  if (wc) wc.textContent = '(' + Object.keys(watched).filter(function(k){ return watched[k]; }).length + ')';

  renderFilters();
  renderCards();
}

function getYears(items) {
  var years = {};
  for (var i = 0; i < items.length; i++) {
    if (items[i].yearList) {
      for (var y = 0; y < items[i].yearList.length; y++) { years[items[i].yearList[y]] = 1; }
    } else if (items[i].year) {
      years[items[i].year] = 1;
    }
  }
  return Object.keys(years).sort(function(a,b){ return b.localeCompare(a); });
}

function renderFilters() {
  var sources = {};
  for (var i = 0; i < state.items.length; i++) {
    var item = state.items[i];
    if (item.awards) {
      for (var a = 0; a < item.awards.length; a++) { sources[item.awards[a].source] = 1; }
    } else if (item.source) {
      sources[item.source] = 1;
    }
  }
  var srcKeys = Object.keys(sources);
  if (state.tab === 'books') srcKeys.sort();

  var html = '<table style="border-spacing:0"><tr>';
  // Source row
  html += '<td style="font-size:.75rem;color:var(--muted);text-align:right;padding:0 4px 0 0;white-space:nowrap;vertical-align:top;padding-top:5px">Source</td>';
  html += '<td style="display:flex;flex-wrap:wrap;gap:6px;padding:0">';
  html += '<button class="filter-chip' + (state.sourceFilter === 'all' ? ' active' : '') + '" data-filter="source" data-val="all">All</button>';
  for (var j = 0; j < srcKeys.length; j++) {
    html += '<button class="filter-chip' + (state.sourceFilter === srcKeys[j] ? ' active' : '') + '" data-filter="source" data-val="' + srcKeys[j] + '">' + srcKeys[j] + '</button>';
  }
  html += '</td></tr>';

  // Year row
  var filtered = state.sourceFilter === 'all' ? state.items : state.items.filter(function(i){
    if (i.awards) {
      for (var a2 = 0; a2 < i.awards.length; a2++) { if (i.awards[a2].source === state.sourceFilter) return true; }
      return false;
    }
    return i.source === state.sourceFilter;
  });
  var years = getYears(filtered);
  html += '<tr>';
  html += '<td style="font-size:.75rem;color:var(--muted);text-align:right;padding:6px 4px 0 0;white-space:nowrap;vertical-align:top;padding-top:11px">Year</td>';
  html += '<td style="display:flex;flex-wrap:wrap;gap:6px;padding:6px 0 0 0">';
  html += '<button class="filter-chip' + (state.yearFilter === 'all' ? ' active' : '') + '" data-filter="year" data-val="all">All</button>';
  for (var y = 0; y < years.length; y++) {
    html += '<button class="filter-chip' + (state.yearFilter === years[y] ? ' active' : '') + '" data-filter="year" data-val="' + years[y] + '">' + years[y] + '</button>';
  }
  html += '</td></tr></table>';

  document.getElementById('filter-bar').innerHTML = html;
}

function renderCards() {
  var filtered = state.items;
  // Source filter (check awards array for merged items, or source field for unmerged)
  if (state.sourceFilter !== 'all') {
    filtered = filtered.filter(function(i){
      if (i.awards) {
        for (var a = 0; a < i.awards.length; a++) { if (i.awards[a].source === state.sourceFilter) return true; }
        return false;
      }
      return i.source === state.sourceFilter;
    });
  }
  // Year filter (check yearList for merged items, year for unmerged)
  if (state.yearFilter !== 'all') {
    filtered = filtered.filter(function(i){
      if (i.yearList) return i.yearList.indexOf(state.yearFilter) >= 0;
      return i.year === state.yearFilter;
    });
  }
  // Search
  if (state.search) {
    var q = state.search.toLowerCase();
    filtered = filtered.filter(function(i){
      return (i.title||'').toLowerCase().indexOf(q) >= 0 || (i.creator||'').toLowerCase().indexOf(q) >= 0;
    });
  }
  // List filter (saved / watched)
  if (state.listFilter === 'saved') {
    filtered = filtered.filter(function(i){ return favorites[getItemId(i)]; });
  } else if (state.listFilter === 'watched') {
    filtered = filtered.filter(function(i){ return watched[getItemId(i)]; });
  }

  // Default: show 10 random when no filters active
  var showAll = !(state.sourceFilter === 'all' && state.yearFilter === 'all' && state.listFilter === 'all' && !state.search);
  if (!showAll && state.defaultLimit > 0) filtered = shuffle(filtered).slice(0, state.defaultLimit);

  var container = document.getElementById('content');

  if (state.loading) {
    container.innerHTML = '<div class="loading-overlay"><div class="spinner"></div><div id="load-progress">Loading...</div></div>';
    return;
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">&#128218;</div><p>No results</p><p class="muted">Try adjusting filters or search terms</p></div>';
    return;
  }

  var html = '<div class="card-grid">';
  for (var i = 0; i < filtered.length; i++) {
    var item = filtered[i];
    var id = getItemId(item);
    var isFav = favorites[id];
    var isWatched = watched[id];
    var imgHtml;
    if (item.thumbnail) {
      imgHtml = '<img class="card-img" src="' + item.thumbnail + '" alt="" loading="lazy" onerror="this.className=\'card-img placeholder\';this.textContent=\'' + (item.title||item.creator||'') + '\'">';
    } else {
      imgHtml = '<div class="card-img placeholder">' + (item.title||item.creator||'') + '</div>';
    }
    html += '<div class="card" data-id="' + id + '" style="position:relative">' +
      '<button class="card-watched' + (isWatched ? ' done' : '') + '" data-watched="' + id + '" title="Watched">&#10003;</button>' +
      '<button class="card-fav' + (isFav ? ' saved' : '') + '" data-fav="' + id + '" title="Save">&#9733;</button>' +
      imgHtml +
      '<div class="card-body">' +
        '<div class="card-title">' + (item.title||item.creator||'') + '</div>' +
        (item.title && item.creator && item.title !== item.creator ? '<div class="card-sub">' + item.creator + '</div>' : '') +
        '<div class="card-badges">' +
          (item.yearList && item.yearList.length > 1 ? '<span class="badge">' + item.yearList[item.yearList.length-1] + '–' + item.yearList[0] + '</span>' : (item.year ? '<span class="badge">' + item.year + '</span>' : '')) +
          (item.awards
            ? (item.awards.length > 1
                ? '<span class="badge" style="background:var(--accent);color:#fff">' + item.awards.length + ' awards</span>'
                : item.awards.map(function(a){ return '<span class="badge">' + a.source + ' · ' + a.award + '</span>'; }).join(''))
            : (item.source ? '<span class="badge">' + item.source + ' · ' + item.award + '</span>' : '')) +
        '</div>' +
      '</div>' +
    '</div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

      '<h2>' + (item.title||item.creator||'') + '</h2>' +
      '<div class="meta">' + (item.title && item.creator && item.title !== item.creator ? item.creator + ' · ' : '') + (item.yearList ? item.yearList.join(', ') : (item.year||'')) + '</div>' +
      (item.awards ? '<div class="card-badges" style="margin-bottom:12px">' + item.awards.map(function(a){ return '<span class="badge">' + a.source + ' · ' + a.award + '</span>'; }).join(' ') + '</div>' : (item.source ? '<div class="card-badges" style="margin-bottom:12px"><span class="badge">' + item.source + ' · ' + item.award + '</span></div>' : '')) +
      (item.extract ? '<div class="summary">' + item.extract.substring(0, 600) + '...</div>' : '') +
      '<div class="modal-actions">' +
        '<button class="btn primary" id="modal-fav">' + (isFav ? '★ Saved' : '☆ Save') + '</button>' +
        '<button class="btn primary" id="modal-watched">' + (isWatched ? '✓ Watched' : '✓ Watch') + '</button>' +
        wikiLink +

  document.getElementById('modal-fav').onclick = function(){ toggleFav(id); showModal(item); };
  document.getElementById('modal-watched').onclick = function(){ toggleWatched(id); showModal(item); };
}

// ===== AUDIT =====
window.runAudit = function() {
  debugEl = document.getElementById('debug');
  if (!debugEl) { console.log('Audit skipped - no debug panel'); return; }
  debugEl.style.display = 'block';
  var items = dataStore.movies ? dataStore.movies.items : state.items;
  if (!items || items.length === 0) { debug('No data to audit'); return; }

  var awards = MOVIE_PAGES.map(function(a){ return a.src + ' ' + a.award; });
  debug('=== AUDIT: ' + awards.length + ' awards ===');

  // Group by year
  var byYear = {};
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var yrs = it.yearList || [it.year];
    for (var y = 0; y < yrs.length; y++) {
      var year = yrs[y];
      if (!year) continue;
      if (!byYear[year]) byYear[year] = {};
      var aws = it.awards || [{source: it.source, award: it.award}];
      for (var a = 0; a < aws.length; a++) {
        var key = aws[a].source + ' ' + aws[a].award;
        byYear[year][key] = (byYear[year][key] || 0) + 1;
      }
    }
  }

  // Print table
  var header = 'YEAR'.padEnd(6);
  for (var h = 0; h < awards.length; h++) {
    header += awards[h].substring(0, 20).padEnd(22);
  }
  debug(header);

  var years = Object.keys(byYear).sort(function(a,b){ return b.localeCompare(a); });
  for (var yi = 0; yi < years.length; yi++) {
    var yr = years[yi];
    var row = yr.padEnd(6);
    var missing = 0;
    for (var ai = 0; ai < awards.length; ai++) {
      var count = byYear[yr][awards[ai]] || 0;
      row += (count > 0 ? '  OK' : '  --').padEnd(22);
      if (count === 0) missing++;
    }
    debug(row + (missing > 0 ? ' (' + missing + ' missing)' : ''));
  }
  debug('=== AUDIT DONE ===');
};

// ===== DATA STORE =====
var dataStore = { movies: null, books: null };

async function loadData(type, forceRefresh) {
  var cacheKey = 'full_' + type;
  var cacheTTL = 86400000; // 24h
  debug('loadData: ' + type + ' force=' + (forceRefresh||false));

  if (!forceRefresh) {
    var cached = cacheGet(cacheKey);
    if (cached) {
      debug(type + ': cache hit, ' + (cached.items ? cached.items.length : 0) + ' items');
      dataStore[type] = cached;
      if (type === state.tab) {
        state.items = cached.items;
        state.loading = false;
        state.cacheAge = 'Cached';
        render();
      }
      return;
    }
  }

  state.loading = true;
  render();
  debug(type + ': fetching fresh data...');

  try {
    dataStore[type] = await fetchAll(type);
    debug(type + ': got ' + (dataStore[type].items ? dataStore[type].items.length : 0) + ' items, ' + dataStore[type].failures + ' failures');
    dataStore[type]._ts = Date.now();
    if (dataStore[type].items.length > 0) {
      cacheSet(cacheKey, dataStore[type], cacheTTL);
    } else {
      debug(type + ': WARNING not caching empty result');
    }
    if (type === state.tab) {
      state.items = dataStore[type].items;
      state.loading = false;
      state.error = dataStore[type].failures > 0;
      state.cacheAge = 'Live';
      render();
    }
  } catch(e) {
    debug(type + ': fetch failed - ' + e.message);
    if (dataStore[type]) {
      if (type === state.tab) document.getElementById('banner').innerHTML = '<div class="banner warn">Live update failed, showing cached data</div>';
    } else if (type === state.tab) {
      state.loading = false;
      state.error = true;
      render();
      document.getElementById('banner').innerHTML = '<div class="banner warn">Failed to load data, check your network</div>';
    }
  }
}

async function refreshInBackground(type, cacheKey, ttl) {
  try {
    var fresh = await fetchAll(type);
    fresh._ts = Date.now();
    cacheSet(cacheKey, fresh, ttl);
    dataStore[type] = fresh;
    if (type === state.tab) {
      state.items = fresh.items;
      state.cacheAge = 'Live';
      render();
    }
  } catch(e) {}
}

async function refreshCurrent() {
  document.getElementById('banner').innerHTML = '';
  debugLines = [];
  await loadData(state.tab, true);
}

document.getElementById('filter-bar').addEventListener('click', function(e){
  if (e.target.classList.contains('filter-chip')) {
    var ftype = e.target.dataset.filter;
    var val = e.target.dataset.val;
    if (ftype === 'source') {
      state.sourceFilter = val;
      state.yearFilter = 'all';
    } else if (ftype === 'year') {
      state.yearFilter = val;
    }
    renderFilters();
    renderCards();
  }
});

function drawRandom() {
  // Pick from all items matching current source + year filters (not just displayed 10)
  var pool = state.items;
  if (state.sourceFilter !== 'all') {
    pool = pool.filter(function(i){
      if (i.awards) {
        for (var a = 0; a < i.awards.length; a++) { if (i.awards[a].source === state.sourceFilter) return true; }
        return false;
      }
      return i.source === state.sourceFilter;
    });
  }
  if (state.yearFilter !== 'all') {
    pool = pool.filter(function(i){
      if (i.yearList) return i.yearList.indexOf(state.yearFilter) >= 0;
      return i.year === state.yearFilter;
    });
  }
  if (pool.length === 0) return;
  var pick = pool[Math.floor(Math.random() * pool.length)];
  showModal(pick);
}

  if (watchedBtn) {
    e.stopPropagation();
    toggleWatched(watchedBtn.dataset.watched);
    return;
  }
  if (favBtn) {
    e.stopPropagation();
    toggleFav(favBtn.dataset.fav);
    return;
  }
  if (card) {
    var id = card.dataset.id;
    var item = state.items.find(function(i){ return getItemId(i) === id; });

  }
});
