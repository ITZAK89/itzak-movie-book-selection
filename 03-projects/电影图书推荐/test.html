<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API 可行性测试 — 电影图书推荐</title>
<style>
  :root {
    --bg: #f5f5f5;
    --card: #fff;
    --text: #333;
    --muted: #888;
    --pass: #2e7d32;
    --pass-bg: #e8f5e9;
    --fail: #c62828;
    --fail-bg: #ffebee;
    --run-bg: #fff3e0;
    --border: #e0e0e0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a2e;
      --card: #222244;
      --text: #ddd;
      --muted: #999;
      --pass: #66bb6a;
      --pass-bg: #1b3a1b;
      --fail: #ef5350;
      --fail-bg: #3a1b1b;
      --run-bg: #3a2e1b;
      --border: #333;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 24px; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }
  .test { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; transition: border-color .3s; }
  .test.running { border-left: 4px solid #ff9800; background: var(--run-bg); }
  .test.pass { border-left: 4px solid var(--pass); }
  .test.fail { border-left: 4px solid var(--fail); background: var(--fail-bg); }
  .test-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .test-num { background: var(--border); color: var(--text); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; }
  .test-name { font-weight: 600; flex: 1; }
  .test-status { font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; }
  .test.running .test-status { background: #ff9800; color: #fff; }
  .test.pass .test-status { background: var(--pass); color: #fff; }
  .test.fail .test-status { background: var(--fail); color: #fff; }
  .test-time { font-size: 0.75rem; color: var(--muted); }
  .test-detail { font-size: 0.82rem; background: rgba(0,0,0,.05); padding: 12px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
  @media (prefers-color-scheme: dark) { .test-detail { background: rgba(255,255,255,.05); } }
  .test-detail.error { color: var(--fail); }
  .section-header { font-size: 0.9rem; font-weight: 700; color: var(--muted); margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  summary { cursor: pointer; font-size: 0.82rem; color: var(--muted); margin-top: 8px; }
  summary:hover { color: var(--text); }
  .summary-bar { margin-top: 24px; padding: 16px; border-radius: 10px; text-align: center; font-weight: 600; }
  .summary-bar.all-pass { background: var(--pass-bg); color: var(--pass); }
  .summary-bar.has-fail { background: var(--fail-bg); color: var(--fail); }
</style>
</head>
<body>

<h1>API 可行性测试</h1>
<p class="subtitle">电影图书推荐项目 — 数据源连通性验证 (共 15 项)</p>

<div id="tests"></div>
<div id="summary"></div>

<script>

function sparql(endpoint, query) {
  const url = endpoint + '?format=json&query=' + encodeURIComponent(query);
  return fetch(url, { headers: { 'Accept': 'application/sparql-results+json', 'User-Agent': 'MovieBookRecTest/1.0' } });
}

function sparqlItems(r) {
  return r.results.bindings;
}

const tests = [
  // ===== 连通性测试 =====
  {
    name: 'Wikipedia REST API — 戛纳 2026 页面摘要',
    desc: 'GET /api/rest_v1/page/summary/2026_Cannes_Film_Festival',
    run: async () => {
      const r = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/2026_Cannes_Film_Festival');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      return 'title: ' + d.title + '\nextract: ' + (d.extract?.substring(0, 200) || '') + '...\nthumbnail: ' + (d.thumbnail?.source || 'none');
    }
  },
  {
    name: 'Wikipedia Core API — 解析获奖表格',
    desc: 'GET /w/api.php?action=parse&page=2026_Cannes_Film_Festival',
    run: async () => {
      const url = 'https://en.wikipedia.org/w/api.php?origin=*&action=parse&page=2026_Cannes_Film_Festival&prop=text&format=json';
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      const html = d.parse.text['*'];
      return 'HTML length: ' + html.length.toLocaleString() + '\nHas "Palme": ' + html.includes('Palme') + '\nHas "Grand Prix": ' + html.includes('Grand Prix') + '\nFirst 300 chars: ' + html.substring(0, 300);
    }
  },

  // ===== 电影数据源 =====
  {
    name: 'Wikidata — 金棕榈 (Palme d\'Or)',
    desc: 'Q179808: Cannes Palme d\'Or winners',
    run: async () => {
      const q = 'SELECT ?film ?filmLabel ?director ?directorLabel ?year WHERE { ?film wdt:P166 wd:Q179808. OPTIONAL { ?film wdt:P57 ?director. } OPTIONAL { ?film p:P166 ?stmt. ?stmt ps:P166 wd:Q179808. ?stmt pq:P585 ?date. BIND(YEAR(?date) AS ?year) } SERVICE wikibase:label { bd:serviceParam wikibase:language "en,zh". } } ORDER BY DESC(?year) LIMIT 10';
      const r = await sparql('https://query.wikidata.org/sparql', q);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const items = sparqlItems(await r.json());
      return items.length + ' items:\n' + items.map(b => (b.year?.value||'?') + ' — ' + b.filmLabel?.value + ' (' + (b.directorLabel?.value||'?') + ')').join('\n');
    }
  },
  {
    name: 'Wikidata — 金狮奖 (Golden Lion)',
    desc: 'Q209459: Venice Golden Lion winners',
    run: async () => {
      const q = 'SELECT ?film ?filmLabel ?director ?directorLabel ?year WHERE { ?film wdt:P166 wd:Q209459. OPTIONAL { ?film wdt:P57 ?director. } OPTIONAL { ?film p:P166 ?stmt. ?stmt ps:P166 wd:Q209459. ?stmt pq:P585 ?date. BIND(YEAR(?date) AS ?year) } SERVICE wikibase:label { bd:serviceParam wikibase:language "en,zh". } } ORDER BY DESC(?year) LIMIT 10';
      const r = await sparql('https://query.wikidata.org/sparql', q);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const items = sparqlItems(await r.json());
      return items.length + ' items:\n' + items.map(b => (b.year?.value||'?') + ' — ' + b.filmLabel?.value + ' (' + (b.directorLabel?.value||'?') + ')').join('\n');
    }
  },
  {
    name: 'Wikidata — 金熊奖 (Golden Bear)',
    desc: 'Q154590: Berlin Golden Bear winners',
    run: async () => {
      const q = 'SELECT ?film ?filmLabel ?director ?directorLabel ?year WHERE { ?film wdt:P166 wd:Q154590. OPTIONAL { ?film wdt:P57 ?director. } OPTIONAL { ?film p:P166 ?stmt. ?stmt ps:P166 wd:Q154590. ?stmt pq:P585 ?date. BIND(YEAR(?date) AS ?year) } SERVICE wikibase:label { bd:serviceParam wikibase:language "en,zh". } } ORDER BY DESC(?year) LIMIT 10';
      const r = await sparql('https://query.wikidata.org/sparql', q);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const items = sparqlItems(await r.json());
      return items.length + ' items:\n' + items.map(b => (b.year?.value||'?') + ' — ' + b.filmLabel?.value + ' (' + (b.directorLabel?.value||'?') + ')').join('\n');
    }
  },
  {
    name: 'Wikidata — 奥斯卡最佳影片',
    desc: 'Q102427: Academy Award Best Picture winners',
    run: async () => {
      const q = 'SELECT ?film ?filmLabel ?director ?directorLabel ?year WHERE { ?film wdt:P166 wd:Q102427. OPTIONAL { ?film wdt:P57 ?director. } OPTIONAL { ?film p:P166 ?stmt. ?stmt ps:P166 wd:Q102427. ?stmt pq:P585 ?date. BIND(YEAR(?date) AS ?year) } SERVICE wikibase:label { bd:serviceParam wikibase:language "en,zh". } } ORDER BY DESC(?year) LIMIT 10';
      const r = await sparql('https://query.wikidata.org/sparql', q);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const items = sparqlItems(await r.json());
      return items.length + ' items:\n' + items.map(b => (b.year?.value||'?') + ' — ' + b.filmLabel?.value + ' (' + (b.directorLabel?.value||'?') + ')').join('\n');
    }
  },

  {
    name: 'Wikidata — 奥斯卡最佳导演',
    desc: 'Q103360: Academy Award Best Director winners',
    run: async () => {
      const q = 'SELECT ?film ?filmLabel ?director ?directorLabel ?year WHERE { ?film wdt:P166 wd:Q103360. OPTIONAL { ?film wdt:P57 ?director. } OPTIONAL { ?film p:P166 ?stmt. ?stmt ps:P166 wd:Q103360. ?stmt pq:P585 ?date. BIND(YEAR(?date) AS ?year) } SERVICE wikibase:label { bd:serviceParam wikibase:language "en,zh". } } ORDER BY DESC(?year) LIMIT 10';
      const r = await sparql('https://query.wikidata.org/sparql', q);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const items = sparqlItems(await r.json());
      return items.length + ' items:\n' + items.map(b => (b.year?.value||'?') + ' — ' + b.filmLabel?.value + ' (' + (b.directorLabel?.value||'?') + ')').join('\n');
    }
  },
  {
    name: 'Wikidata — 奥斯卡最佳男演员',
    desc: 'Q103916: Academy Award Best Actor (actor→film via pq:P1686)',
    run: async () => {
      const q = 'SELECT ?actor ?actorLabel ?film ?filmLabel ?year WHERE { ?actor wdt:P166 wd:Q103916; wdt:P31 wd:Q5. OPTIONAL { ?actor p:P166 ?stmt. ?stmt ps:P166 wd:Q103916. ?stmt pq:P585 ?date. BIND(YEAR(?date) AS ?year) } OPTIONAL { ?stmt pq:P1686 ?film. } SERVICE wikibase:label { bd:serviceParam wikibase:language "en,zh". } } ORDER BY DESC(?year) LIMIT 10';
      const r = await sparql('https://query.wikidata.org/sparql', q);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const items = sparqlItems(await r.json());
      return items.length + ' items:\n' + items.map(b => (b.year?.value||'?') + ' — ' + b.actorLabel?.value + ': ' + (b.filmLabel?.value||'?')) .join('\n');
    }
  },
  {
    name: 'Wikidata — 奥斯卡最佳女演员',
    desc: 'Q103618: Academy Award Best Actress (no pq:P1686, fast)',
    run: async () => {
      const q = 'SELECT ?actor ?actorLabel ?year WHERE { ?actor wdt:P166 wd:Q103618; wdt:P31 wd:Q5. OPTIONAL { ?actor p:P166 ?stmt. ?stmt ps:P166 wd:Q103618. ?stmt pq:P585 ?date. BIND(YEAR(?date) AS ?year) } SERVICE wikibase:label { bd:serviceParam wikibase:language "en,zh". } } ORDER BY DESC(?year) LIMIT 10';
      const r = await sparql('https://query.wikidata.org/sparql', q);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const items = sparqlItems(await r.json());
      return items.length + ' items:\n' + items.map(b => (b.year?.value||'?') + ' — ' + b.actorLabel?.value).join('\n');
    }
  },

  // ===== 图书数据源 =====
  {
    name: 'Wikidata — 布克奖 (Booker Prize)',
    desc: 'Q160082: Booker Prize winners (via author→work)',
    run: async () => {
      const q = 'SELECT ?author ?authorLabel ?book ?bookLabel ?year WHERE { ?author wdt:P166 wd:Q160082; wdt:P31 wd:Q5. OPTIONAL { ?author p:P166 ?stmt. ?stmt ps:P166 wd:Q160082. ?stmt pq:P585 ?date. BIND(YEAR(?date) AS ?year) } OPTIONAL { ?stmt pq:P1686 ?book. } SERVICE wikibase:label { bd:serviceParam wikibase:language "en,zh". } } ORDER BY DESC(?year) LIMIT 10';
      const r = await sparql('https://query.wikidata.org/sparql', q);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const items = sparqlItems(await r.json());
      return items.length + ' items:\n' + items.map(b => (b.year?.value||'?') + ' — ' + b.authorLabel?.value + ': ' + (b.bookLabel?.value||'?')) .join('\n');
    }
  },
  {
    name: 'Wikidata — 诺贝尔文学奖',
    desc: 'Q37922: Nobel Literature winners',
    run: async () => {
      const q = 'SELECT ?author ?authorLabel ?year WHERE { ?author wdt:P166 wd:Q37922; wdt:P31 wd:Q5. OPTIONAL { ?author p:P166 ?stmt. ?stmt ps:P166 wd:Q37922. ?stmt pq:P585 ?date. BIND(YEAR(?date) AS ?year) } SERVICE wikibase:label { bd:serviceParam wikibase:language "en,zh". } } ORDER BY DESC(?year) LIMIT 10';
      const r = await sparql('https://query.wikidata.org/sparql', q);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const items = sparqlItems(await r.json());
      return items.length + ' items:\n' + items.map(b => (b.year?.value||'?') + ' — ' + b.authorLabel?.value).join('\n');
    }
  },
  {
    name: 'Wikidata — 普利策小说奖',
    desc: 'Q833633: Pulitzer Prize for Fiction winners',
    run: async () => {
      const q = 'SELECT ?book ?bookLabel ?author ?authorLabel ?year WHERE { ?book wdt:P166 wd:Q833633. OPTIONAL { ?book wdt:P50 ?author. } OPTIONAL { ?book p:P166 ?stmt. ?stmt ps:P166 wd:Q833633. ?stmt pq:P585 ?date. BIND(YEAR(?date) AS ?year) } SERVICE wikibase:label { bd:serviceParam wikibase:language "en,zh". } } ORDER BY DESC(?year) LIMIT 10';
      const r = await sparql('https://query.wikidata.org/sparql', q);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const items = sparqlItems(await r.json());
      return items.length + ' items:\n' + items.map(b => (b.year?.value||'?') + ' — ' + b.bookLabel?.value + ' (' + (b.authorLabel?.value||'?') + ')').join('\n');
    }
  },
  {
    name: 'Wikidata — 国际布克奖',
    desc: 'Q2052291: International Booker winners',
    run: async () => {
      const q = 'SELECT ?author ?authorLabel ?book ?bookLabel ?year WHERE { ?author wdt:P166 wd:Q2052291; wdt:P31 wd:Q5. OPTIONAL { ?author p:P166 ?stmt. ?stmt ps:P166 wd:Q2052291. ?stmt pq:P585 ?date. BIND(YEAR(?date) AS ?year) } OPTIONAL { ?stmt pq:P1686 ?book. } SERVICE wikibase:label { bd:serviceParam wikibase:language "en,zh". } } ORDER BY DESC(?year) LIMIT 10';
      const r = await sparql('https://query.wikidata.org/sparql', q);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const items = sparqlItems(await r.json());
      return items.length + ' items:\n' + items.map(b => (b.year?.value||'?') + ' — ' + b.authorLabel?.value + ': ' + (b.bookLabel?.value||'?')) .join('\n');
    }
  },

  // ===== 媒体书单 =====
  {
    name: 'LibraryThing Awards Feed — CORS 测试',
    desc: '测 LibraryThing 是否允许浏览器跨域 fetch',
    run: async () => {
      const r = await fetch('https://www.librarything.com/services/feeds/awards');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const text = await r.text();
      return 'CORS OK. Response length: ' + text.length.toLocaleString() + '\nFirst 500 chars:\n' + text.substring(0, 500);
    }
  },

  // ===== 封面图 =====
  {
    name: 'Wikipedia REST — 封面图验证',
    desc: '逐条 /page/summary/ 获取海报/封面',
    run: async () => {
      const titles = ['Parasite_(2019_film)', 'Anora_(film)', 'The_Remains_of_the_Day', 'Lincoln_in_the_Bardo'];
      const out = [];
      for (const t of titles) {
        const r = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + t);
        if (!r.ok) { out.push(t + ': HTTP ' + r.status); continue; }
        const d = await r.json();
        out.push(d.title + ': thumbnail=' + (d.thumbnail?.source ? 'YES ' + d.thumbnail.width + 'px' : 'NO') + ' original=' + (d.originalimage?.source ? 'YES' : 'NO'));
      }
      return out.join('\n');
    }
  }
];

function renderTest(i, test) {
  return '<div class="test running" id="test-' + i + '">' +
    '<div class="test-header">' +
      '<span class="test-num">' + (i + 1) + '</span>' +
      '<span class="test-name">' + test.name + '</span>' +
      '<span class="test-status">Running...</span>' +
      '<span class="test-time" id="time-' + i + '"></span>' +
    '</div>' +
    '<div style="font-size:0.78rem;color:var(--muted);margin-bottom:8px">' + test.desc + '</div>' +
    '<div class="test-detail" id="detail-' + i + '">loading...</div>' +
  '</div>';
}

function updateTest(i, pass, detail, timeMs) {
  var el = document.getElementById('test-' + i);
  el.classList.remove('running');
  el.classList.add(pass ? 'pass' : 'fail');
  el.querySelector('.test-status').textContent = pass ? 'PASS' : 'FAIL';
  document.getElementById('time-' + i).textContent = timeMs + 'ms';
  var detailEl = document.getElementById('detail-' + i);
  detailEl.textContent = detail;
  if (!pass) detailEl.classList.add('error');
}

async function runAll() {
  document.getElementById('tests').innerHTML = tests.map(function(t, i) { return renderTest(i, t); }).join('');

  var results = [];
  for (var i = 0; i < tests.length; i++) {
    var start = performance.now();
    try {
      var detail = await tests[i].run();
      var ms = Math.round(performance.now() - start);
      updateTest(i, true, detail, ms);
      results.push(true);
    } catch (e) {
      var ms = Math.round(performance.now() - start);
      updateTest(i, false, 'Error: ' + e.message + '\n\n' + (e.stack || ''), ms);
      results.push(false);
    }
  }

  var failed = results.filter(function(r) { return !r; }).length;
  var summary = document.getElementById('summary');
  summary.className = 'summary-bar ' + (failed === 0 ? 'all-pass' : 'has-fail');
  summary.textContent = failed === 0
    ? 'All ' + results.length + ' tests passed — ready to build'
    : failed + '/' + results.length + ' failed — need to adjust data sources';
}

runAll();
</script>
</body>
</html>
