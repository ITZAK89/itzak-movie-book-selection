<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>全部电影节奖项测试</title>
<style>
body{font:14px -apple-system,sans-serif;background:#111;color:#eee;padding:20px}
h2{color:#6c8cff;margin-top:24px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card{background:#222;border-radius:8px;overflow:hidden}
.card img{width:100%;height:280px;object-fit:cover;background:#333}
.card-body{padding:10px}.card-body h3{margin:0 0 4px;font-size:.9rem}
.card-body p{margin:0;font-size:.75rem;color:#aaa}.err{color:#f44336}.stat{color:#4caf50}
</style></head><body>
<select id="sel" style="font-size:16px;padding:8px;margin-bottom:12px;background:#333;color:#fff;border:1px solid #555"></select>
<button id="go" style="font-size:16px;padding:8px 16px;margin-left:8px;background:#6c8cff;color:#fff;border:none;border-radius:4px;cursor:pointer">Go</button>
<div id="out"></div>
<script>
var AWARDS = [
  {src:'Cannes',name:'Palme d\'Or', page:'Palme_d%27Or'},
  {src:'Cannes',name:'Grand Prix', page:'Grand_Prix_(Cannes_Film_Festival)'},
  {src:'Cannes',name:'Jury Prize', page:'Jury_Prize_(Cannes_Film_Festival)'},
  {src:'Cannes',name:'Best Director', page:'Cannes_Film_Festival_Award_for_Best_Director'},
  {src:'Cannes',name:'Best Actor', page:'Cannes_Film_Festival_Award_for_Best_Actor'},
  {src:'Cannes',name:'Best Actress', page:'Cannes_Film_Festival_Award_for_Best_Actress'},
  {src:'Venice',name:'Golden Lion', page:'Golden_Lion'},
  {src:'Venice',name:'Silver Lion', page:'Silver_Lion'},
  {src:'Venice',name:'Volpi Cup Actor', page:'Volpi_Cup_for_Best_Actor'},
  {src:'Venice',name:'Volpi Cup Actress', page:'Volpi_Cup_for_Best_Actress'},
  {src:'Berlin',name:'Golden Bear', page:'Golden_Bear'},
  {src:'Berlin',name:'Silver Bear Jury', page:'Silver_Bear_Grand_Jury_Prize'},
  {src:'Berlin',name:'Silver Bear Director', page:'Silver_Bear_for_Best_Director'},
  {src:'Berlin',name:'Silver Bear Actor', page:'Silver_Bear_for_Best_Actor'},
  {src:'Berlin',name:'Silver Bear Actress', page:'Silver_Bear_for_Best_Actress'},
  {src:'Oscars',name:'Best Picture', page:'Academy_Award_for_Best_Picture'},
  {src:'Oscars',name:'Best Director', page:'Academy_Award_for_Best_Director'},
  {src:'Oscars',name:'Best Actor', page:'Academy_Award_for_Best_Actor'},
  {src:'Oscars',name:'Best Actress', page:'Academy_Award_for_Best_Actress'}
];

async function fetchPage(pageName) {
  var url = 'https://en.wikipedia.org/w/api.php?origin=*&action=parse&page=' + pageName + '&prop=text&format=json';
  var r = await fetch(url); var d = await r.json();
  return d.parse.text['*'];
}

function clean(s) { return s.replace(/\[.*?\]/g,'').replace(/[§*]/g,'').trim(); }
function cleanFilm(s) {
  s = s.replace(/\[.*?\]/g,'').replace(/[§*]/g,'').trim();
  // Remove parenthetical years like "(1959)" or "(1979, 1982)"
  s = s.replace(/\s*\(\d{4}[^)]*\)/g,'');
  // Split on separators that indicate extra info
  var parts = s.split(/  +|\t|, ·| · \d{4}|,\s*\d{4}/);
  return parts[0].trim();
}

function parseWinners(html) {
  var doc = new DOMParser().parseFromString(html, 'text/html');
  var tables = doc.querySelectorAll('table.wikitable');
  var all = [];
  for (var t = 0; t < tables.length; t++) {
    var rows = tables[t].querySelectorAll('tr');
    if (rows.length < 3) continue;
    // Only parse tables where first data row has a 4-digit year
    var firstDataCells = rows[1] ? rows[1].querySelectorAll('td,th') : null;
    if (!firstDataCells || firstDataCells.length < 1) continue;
    var testYear = firstDataCells[0].textContent.replace(/\[.*?\]/g,'').trim();
    if (!/^\d{4}$/.test(testYear) || parseInt(testYear) < 1990) continue;

    // Auto-detect columns from header row
    var headerCells = rows[0].querySelectorAll('th');
    var headers = [];
    for (var h = 0; h < headerCells.length; h++) headers.push(headerCells[h].textContent.trim().toLowerCase());

    var filmCol = -1, winnerCol = -1;
    for (var c = 0; c < headers.length; c++) {
      var ht = headers[c];
      // Film column: look for "english title", "film", "title"
      if (filmCol < 0 && (ht.indexOf('english') >= 0 || ht.indexOf('film') >= 0)) filmCol = c;
      if (filmCol < 0 && ht.indexOf('title') >= 0 && ht.indexOf('original') < 0) filmCol = c;
      // Winner column: look for director, actor, actress, winner, recipient
      if (winnerCol < 0 && (ht.indexOf('director') >= 0 || ht.indexOf('réalisateur') >= 0)) winnerCol = c;
      if (winnerCol < 0 && (ht.indexOf('actor') >= 0 || ht.indexOf('actress') >= 0)) winnerCol = c;
      if (winnerCol < 0 && (ht.indexOf('winner') >= 0 || ht.indexOf('recipient') >= 0)) winnerCol = c;
    }
    // Fallbacks
    if (filmCol < 0) filmCol = (headers.length >= 3 ? 2 : 1);
    if (winnerCol < 0) winnerCol = 1;
    console.log('  Table ' + t + ' headers: ' + headers.join(' | ') + ' => filmCol=' + filmCol + ' winnerCol=' + winnerCol);

    var prevYear = '', debugShown = 0;
    for (var r = 1; r < rows.length; r++) {
      var cells = rows[r].querySelectorAll('td,th');
      if (cells.length < 2) continue;
      if (debugShown < 3) {
        var raw = []; for (var ci = 0; ci < Math.min(8, cells.length); ci++) raw.push('['+ci+']'+cells[ci].textContent.substring(0,40));
        console.log('  Row'+r+' ('+cells.length+'c): ' + raw.join(' | '));
        debugShown++;
      }
      var first = cells[0].textContent.replace(/\[.*?\]/g,'').trim();
      var shift = 0, year;
      if (/^\d{4}$/.test(first) && parseInt(first) >= 1990) { year = first; prevYear = year; }
      else if (prevYear) { year = prevYear; shift = 1; }
      else continue;

      var fi = filmCol - shift, wi = winnerCol - shift;
      if (fi < 0) fi = 0; if (wi < 0) wi = 0;

      var film = (fi < cells.length) ? cleanFilm(cells[fi].textContent) : '';
      var winner = (wi < cells.length) ? clean(cells[wi].textContent) : '';
      if (!film) continue;
      all.push({year: parseInt(year), film: film, winner: winner, thumb: null});
    }
  }
  return all;
}

async function getPoster(film, year, winner) {
  try {
    var q = encodeURIComponent('"' + film + '" (' + year + ' film)');
    var sr = await fetch('https://en.wikipedia.org/w/api.php?origin=*&action=query&list=search&srsearch=' + q + '&format=json&srlimit=5');
    if (!sr.ok) return null;
    var sd = await sr.json();
    var pages = sd.query.search;
    if (!pages || pages.length === 0) return null;
    // Build stopwords from winner name
    var stopWords = (winner||'').toLowerCase().split(/\s+/);
    for (var p = 0; p < pages.length; p++) {
      var title = pages[p].title;
      var tl = title.toLowerCase();
      if (tl.indexOf('cannes') >= 0) continue;
      // Skip if title matches winner name (actor page, not film page)
      var hitStop = false;
      for (var sw = 0; sw < stopWords.length; sw++) {
        if (stopWords[sw].length > 3 && tl.indexOf(stopWords[sw]) >= 0) { hitStop = true; break; }
      }
      if (hitStop) continue;
      var r = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(title));
      if (r.ok) {
	        var d = await r.json();
	        var desc = (d.description||"").toLowerCase();
	        var tl = title.toLowerCase();
	        var isFilm = desc.indexOf("film") >= 0 || tl.indexOf("(film)") >= 0;
	        var isPerson = desc.indexOf("actor") >= 0 || desc.indexOf("actress") >= 0 || desc.indexOf("director") >= 0;
	        if (isPerson && !isFilm) continue;
	        var ext = (d.extract||"").toLowerCase();
	        if (/^(is|was|born)/.test(ext) && !isFilm) continue;
	        if (d.thumbnail) return d.thumbnail.source;
async function runOne(idx) {
  var out = document.getElementById('out');
  var award = AWARDS[idx];
  out.innerHTML = '<p>Fetching ' + award.src + ' ' + award.name + '...</p>';
  var html = await fetchPage(award.page);
  var rows = parseWinners(html);
  out.innerHTML += '<p class="stat">' + rows.length + ' films (1990-). Loading posters...</p>';

  for (var i = 0; i < rows.length; i += 6) {
    var batch = rows.slice(i, i + 6);
    await Promise.all(batch.map(async function(r) {
      r.thumb = await getPoster(r.film, r.year, r.winner);
    }));
  }
  var ok = rows.filter(function(r){ return r.thumb; }).length;
  out.innerHTML += '<p class="stat">Posters: ' + ok + '/' + rows.length + '</p>';

  // Dump data table
  out.innerHTML += '<h2>' + award.src + ' — ' + award.name + '</h2>';
  out.innerHTML += '<table style="border-collapse:collapse;width:100%"><tr><th style="border:1px solid #555;padding:4px">Year</th><th style="border:1px solid #555;padding:4px">Film</th><th style="border:1px solid #555;padding:4px">Winner</th></tr>';
  for (var j = 0; j < rows.length; j++) {
    out.innerHTML += '<tr><td style="border:1px solid #333;padding:4px">' + rows[j].year + '</td><td style="border:1px solid #333;padding:4px">' + rows[j].film + '</td><td style="border:1px solid #333;padding:4px">' + rows[j].winner + '</td></tr>';
  }
  out.innerHTML += '</table>';

  out.innerHTML += '<h2>Cards</h2><div class="grid">';
  for (var k = 0; k < rows.length; k++) {
    var r = rows[k];
    out.innerHTML += '<div class="card">' +
      (r.thumb ? '<img src="' + r.thumb + '" loading="lazy" onerror="this.style.display=\'none\'">' :
       '<div style="height:280px;display:flex;align-items:center;justify-content:center;background:#333;color:#666;font-size:.8rem;text-align:center;padding:10px">' + r.film + '</div>') +
      '<div class="card-body"><h3>' + r.film + '</h3><p>' + r.year + ' · ' + r.winner + '</p></div></div>';
  }
  out.innerHTML += '</div>';
}

// Build dropdown
var sel = document.getElementById('sel');
for (var i = 0; i < AWARDS.length; i++) {
  sel.innerHTML += '<option value="' + i + '">' + AWARDS[i].src + ' — ' + AWARDS[i].name + '</option>';
}
document.getElementById('go').onclick = function() { runOne(parseInt(sel.value)); };
</script></body></html>
