<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电影图书推荐</title>
<style>
:root {
  --bg: #0f0f1a; --surface: #1a1a2e; --card: #222244;
  --text: #e0e0e0; --muted: #888; --accent: #6c8cff;
  --badge: #2a2a4a; --border: #333; --hover: #2a2a50;
  --shadow: 0 2px 8px rgba(0,0,0,.4);
}
.light {
  --bg: #f0f2f5; --surface: #fff; --card: #fff;
  --text: #222; --muted: #666; --accent: #4a6cf7;
  --badge: #e8ecf4; --border: #ddd; --hover: #f0f2f8;
  --shadow: 0 2px 8px rgba(0,0,0,.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  transition: background .3s, color .3s;
}
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
header h1 { font-size: 1.2rem; font-weight: 700; }
.header-right { display: flex; align-items: center; gap: 12px; }
.theme-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-dot.ok { background: #4caf50; }
.status-dot.loading { background: #ff9800; animation: pulse 1s infinite; }
.status-dot.error { background: #f44336; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.status-text { font-size: .75rem; color: var(--muted); }

.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 24px; }
.tab {
  padding: 12px 24px; cursor: pointer; border: none; background: none;
  color: var(--muted); font-size: .9rem; font-weight: 500;
  border-bottom: 2px solid transparent; transition: all .2s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text); }

main { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

.filter-bar {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; align-items: center;
}
.filter-chip {
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--badge); color: var(--muted); cursor: pointer;
  font-size: .8rem; white-space: nowrap; transition: all .2s;
}
.filter-chip:hover { border-color: var(--accent); color: var(--text); }
.filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.search-box {
  margin-left: auto; padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: .85rem; width: 220px;
  outline: none; transition: border-color .2s;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--muted); }

.banner {
  padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; font-size: .82rem;
  display: flex; align-items: center; gap: 8px;
}
.banner.warn { background: #3a2e1b; color: #ffb74d; border: 1px solid #5a4a2a; }
.light .banner.warn { background: #fff8e1; color: #e65100; border: 1px solid #ffe0b2; }

.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}
.card {
  background: var(--card); border-radius: 12px; overflow: hidden;
  box-shadow: var(--shadow); cursor: pointer; transition: transform .2s, box-shadow .2s;
  border: 1px solid var(--border);
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.3); }
.card-img {
  width: 100%; height: 320px; object-fit: cover; background: var(--badge);
  display: flex; align-items: center; justify-content: center;
}
.card-img.placeholder {
  background: linear-gradient(135deg, var(--badge), var(--surface));
  color: var(--muted); font-size: .85rem; text-align: center; padding: 16px;
}
.card-body { padding: 14px; }
.card-title { font-weight: 600; font-size: .95rem; margin-bottom: 4px; line-height: 1.3; }
.card-sub { font-size: .8rem; color: var(--muted); margin-bottom: 8px; }
.card-badges { display: flex; flex-wrap: wrap; gap: 4px; }
.badge {
  padding: 3px 8px; border-radius: 4px; font-size: .7rem; font-weight: 500;
  background: var(--badge); color: var(--accent);
}
.card-fav {
  position: absolute; top: 8px; right: 8px; width: 28px; height: 28px;
  border-radius: 50%; background: rgba(0,0,0,.5); border: none; color: #fff;
  cursor: pointer; font-size: .85rem; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s;
}
.card:hover .card-fav { opacity: 1; }
.card-fav.saved { opacity: 1; color: #ffd700; }

.empty-state {
  text-align: center; padding: 60px 20px; color: var(--muted);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { margin-bottom: 4px; }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: var(--surface); border-radius: 16px; max-width: 640px; width: 100%;
  max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,.5);
}
.modal-close {
  float: right; margin: 12px; width: 32px; height: 32px; border-radius: 50%;
  border: none; background: var(--badge); color: var(--text); cursor: pointer;
  font-size: 1.1rem;
}
.modal-img { width: 100%; max-height: 400px; object-fit: cover; }
.modal-body { padding: 24px; }
.modal-body h2 { font-size: 1.3rem; margin-bottom: 6px; }
.modal-body .meta { color: var(--muted); font-size: .85rem; margin-bottom: 12px; }
.modal-body .summary { font-size: .9rem; line-height: 1.6; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; }
.btn {
  padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--badge); color: var(--text); cursor: pointer; font-size: .85rem;
  transition: all .2s;
}
.btn:hover { border-color: var(--accent); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn.external { background: transparent; color: var(--accent); border-color: var(--accent); }

.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  padding: 60px 20px; color: var(--muted); font-size: .9rem;
}

footer {
  text-align: center; padding: 24px; color: var(--muted); font-size: .75rem;
}

@media (max-width: 768px) {
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .card-img { height: 220px; }
  .card-body { padding: 10px; }
  .card-title { font-size: .85rem; }
  .filter-bar { gap: 6px; }
  header { padding: 12px 16px; }
  main { padding: 12px 16px; }
  .search-box { width: 150px; }
}
</style>
</head>
<body>

<header>
  <h1>电影图书推荐</h1>
  <div class="header-right">
    <span class="status-dot loading" id="status-dot" title="加载中"></span>
    <span class="status-text" id="status-text">加载中...</span>
    <button class="theme-btn" id="export-btn" title="导出测试数据" style="font-size:.65rem;width:auto;padding:0 10px;border-radius:6px">Export</button>
    <button class="theme-btn" id="refresh-btn" title="刷新数据">&#8635;</button>
    <button class="theme-btn" id="theme-btn" title="切换主题">&#9788;</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="movies">电影</button>
  <button class="tab" data-tab="books">图书</button>
</div>

<main>
  <div id="banner"></div>
  <div id="debug" style="font-size:.75rem;color:var(--muted);margin-bottom:12px;font-family:monospace;max-height:300px;overflow-y:auto;background:var(--surface);border-radius:8px;padding:8px 12px;display:none"></div>
  <div class="filter-bar" id="filter-bar"></div>
  <input type="text" class="search-box" id="search" placeholder="搜索...">
  <div id="content"></div>
</main>

<div id="modal-container"></div>
<footer>数据来源: Wikipedia · Wikidata · TSPDT</footer>

<script src="test-data.js"></script>
<script>
// ===== DEBUG =====
var debugEl, debugLines = [];
function debug(msg) {
  debugLines.push(new Date().toLocaleTimeString() + ' ' + msg);
  if (debugLines.length > 50) debugLines.shift();
  if (debugEl) debugEl.textContent = debugLines.join('\n');
  console.log(msg);
}

// ===== CONFIG =====
var VERSION = 'v8';
(function checkVersion(){
  var v = localStorage.getItem('mbr_version');
  if (v !== VERSION) {
    var keys = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k.indexOf('mbr_') === 0) keys.push(k);
    }
    for (var j = 0; j < keys.length; j++) localStorage.removeItem(keys[j]);
    localStorage.setItem('mbr_version', VERSION);
  }
})();

const MOVIE_AWARDS = [
  {src:'Cannes',award:'Palme d\'Or',qid:'Q179808'},
  {src:'Cannes',award:'Grand Prix',qid:'Q28455848'},
  {src:'Cannes',award:'Jury Prize',qid:'Q1342432'},
  {src:'Venice',award:'Golden Lion',qid:'Q209459'},
  {src:'Berlin',award:'Golden Bear',qid:'Q154590'},
  {src:'Berlin',award:'Silver Bear Jury',qid:'Q664212'},
  {src:'Oscars',award:'Best Picture',qid:'Q102427'}
];

// Festival pages to scrape for full award lists (replaces person SPARQL)
const FESTIVAL_PAGES = [
  {src:'Cannes', years:['2026','2025','2024'], page:function(y){ return y+'_Cannes_Film_Festival'; }},
  {src:'Venice', years:['2025','2024','2023'], page:function(y){ return y+'_Venice_Film_Festival'; }},
  {src:'Berlin', years:['2025','2024','2023'], page:function(y){ return y+'_Berlin_International_Film_Festival'; }},
  {src:'Oscars', years:['2026','2025','2024'], page:function(y){
    // 2026 ceremony = 98th, 2025 = 97th, 2024 = 96th
    var m = {'2026':'98th','2025':'97th','2024':'96th'};
    return (m[y]||'')+'_Academy_Awards';
  }}
];

const BOOK_AWARDS = [
  {src:'Booker Prize',award:'Winner',qid:'Q160082',p:'person'},
  {src:'Nobel Literature',award:'Laureate',qid:'Q37922',p:'person_simple'},
  {src:'Pulitzer Fiction',award:'Winner',qid:'Q833633',p:'work'},
  {src:'Intl Booker',award:'Winner',qid:'Q2052291',p:'person_simple'},
  {src:'National Book Award',award:'Winner',qid:'Q572316',p:'work'},
  {src:'Women\'s Prize',award:'Winner',qid:'Q18884',p:'work'},
  {src:'PEN/Faulkner',award:'Winner',qid:'Q1188661',p:'work'},
  {src:'Costa Book Award',award:'Winner',qid:'Q1136336',p:'work'}
];

// ===== CACHE =====
function cacheGet(k) {
  try {
    var e = JSON.parse(localStorage.getItem('mbr_' + k));
    if (!e || !e.data) return null;
    if (Date.now() - e.ts > e.ttl) return null;
    return e.data;
  } catch(x) { return null; }
}
function cacheSet(k, data, ttl) {
  try { localStorage.setItem('mbr_' + k, JSON.stringify({data:data, ts:Date.now(), ttl:ttl})); } catch(x) {}
}

// ===== SPARQL =====
async function runSparql(query, timeout) {
  debug('runSparql ENTER');
  timeout = timeout || 20000;
  var url = 'https://query.wikidata.org/sparql?format=json&query=' + encodeURIComponent(query);
  debug('runSparql url built, len=' + url.length);
  try {
    var r = await fetch(url, {
      headers: {'Accept':'application/sparql-results+json','User-Agent':'MovieBookRec/1.0'}
    });
    if (!r.ok) {
      debug('  SPARQL HTTP ' + r.status + ' for url len=' + url.length);
      throw new Error('HTTP '+r.status);
    }
    var j = await r.json();
    var bindings = j.results.bindings;
    if (!bindings || bindings.length === 0) {
      debug('  SPARQL 0 rows, qid in url: ' + url.indexOf('wd:Q'));
    } else {
      debug('  SPARQL ok, first row keys: ' + Object.keys(bindings[0]).join(','));
    }
    return bindings;
  } catch(e) {
    if (e.message.indexOf('HTTP') === 0) throw e;
    debug('  SPARQL error: ' + e.message);
    throw e;
  }
}

function buildMovieQuery(qid) {
  var wiki = 'OPTIONAL { ?article schema:about ?item; schema:inLanguage "en"; schema:isPartOf <https://en.wikipedia.org/>. }';
  return 'SELECT ?item ?itemLabel ?creator ?creatorLabel ?year ?article WHERE { ?item wdt:P166 wd:' + qid + '; wdt:P31/wdt:P279* wd:Q11424. OPTIONAL { ?item wdt:P57 ?creator. } OPTIONAL { ?item p:P166 ?s. ?s ps:P166 wd:' + qid + '. ?s pq:P585 ?d. BIND(YEAR(?d) AS ?year) } ' + wiki + ' SERVICE wikibase:label { bd:serviceParam wikibase:language "en,zh". } } ORDER BY DESC(?year) LIMIT 20';
}

function buildBookQuery(qid) {
  // Try work-first, then person approach for book awards
  return 'SELECT ?item ?itemLabel ?creator ?creatorLabel ?year WHERE { ?item wdt:P166 wd:' + qid + '. OPTIONAL { ?item wdt:P50 ?creator. } OPTIONAL { ?item p:P166 ?s. ?s ps:P166 wd:' + qid + '. ?s pq:P585 ?d. BIND(YEAR(?d) AS ?year) } SERVICE wikibase:label { bd:serviceParam wikibase:language "en,zh". } } ORDER BY DESC(?year) LIMIT 20';
}

function wikiTitleFromUrl(url) {
  if (!url) return null;
  // Extract page title from https://en.wikipedia.org/wiki/Page_Title
  var parts = url.split('/wiki/');
  return parts.length > 1 ? decodeURIComponent(parts[parts.length - 1]) : null;
}

function getWikiSummary(title) {
  if (!title) return Promise.resolve(null);
  return fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(title))
    .then(function(r){ return r.ok ? r.json() : null; })
    .catch(function(){ return null; });
}

// ===== WIKIPEDIA FESTIVAL PARSER =====
async function fetchFestivalPage(src, year) {
  var fp = FESTIVAL_PAGES.find(function(f){ return f.src === src; });
  if (!fp) return [];
  var pageName = fp.page(year);
  var url = 'https://en.wikipedia.org/w/api.php?origin=*&action=parse&page=' + encodeURIComponent(pageName) + '&prop=text&format=json';
  try {
    var r = await fetch(url);
    if (!r.ok) return [];
    var d = await r.json();
    var html = d.parse.text['*'];
    return parseAwards(html, src, year);
  } catch(e) { return []; }
}

function parseAwards(html, src, year) {
  var items = [];
  // Use DOMParser to parse HTML
  var parser = new DOMParser();
  var doc = parser.parseFromString(html, 'text/html');
  var tables = doc.querySelectorAll('table.wikitable');
  for (var t = 0; t < tables.length; t++) {
    var rows = tables[t].querySelectorAll('tr');
    var headerTexts = [];
    var headerRow = rows[0];
    if (headerRow) {
      var ths = headerRow.querySelectorAll('th');
      for (var h = 0; h < ths.length; h++) { headerTexts.push(ths[h].textContent.trim().toLowerCase()); }
    }
    // Find column indices for award, winner/recipient, film
    var awardCol = -1, winnerCol = -1, filmCol = -1;
    for (var c = 0; c < headerTexts.length; c++) {
      var ht = headerTexts[c];
      if (ht.indexOf('award') >= 0 || ht.indexOf('category') >= 0 || ht.indexOf('prize') >= 0) awardCol = c;
      if (ht.indexOf('winner') >= 0 || ht.indexOf('recipient') >= 0 || ht.indexOf('nominee') >= 0) winnerCol = c;
      if (ht.indexOf('film') >= 0 || ht.indexOf('work') >= 0 || ht.indexOf('title') >= 0 || ht.indexOf('motion picture') >= 0) filmCol = c;
    }
    // If no clear columns found, try common patterns: col 0 = award, col 1 = winner, col 2 = film
    if (awardCol < 0 && headerTexts.length >= 2) awardCol = 0;
    if (winnerCol < 0 && headerTexts.length >= 2) winnerCol = 1;
    if (filmCol < 0 && headerTexts.length >= 3) filmCol = 2;

    for (var r = 1; r < rows.length; r++) {
      var cells = rows[r].querySelectorAll('td');
      if (cells.length < 2) continue;
      var awardName = awardCol >= 0 && cells[awardCol] ? cells[awardCol].textContent.trim() : '';
      var winnerName = winnerCol >= 0 && cells[winnerCol] ? cells[winnerCol].textContent.trim() : '';
      var filmName = filmCol >= 0 && cells[filmCol] ? cells[filmCol].textContent.trim() : '';
      // Clean up
      awardName = awardName.replace(/\[.*?\]/g,'').replace(/\s+/g,' ').trim();
      winnerName = winnerName.replace(/\[.*?\]/g,'').replace(/\s+/g,' ').trim();
      filmName = filmName.replace(/\[.*?\]/g,'').replace(/\s+/g,' ').trim();
      if (!awardName || (!winnerName && !filmName)) continue;
      // Map common award name variations
      var mappedAward = mapAwardName(awardName, src);
      if (!mappedAward) continue; // Skip unrelated table rows
      items.push({
        title: filmName || null,
        creator: winnerName || '',
        year: year,
        source: src,
        award: mappedAward,
        wikiTitle: null, // Will be enriched later via film title search
        isWork: !!filmName
      });
    }
  }
  return items;
}

function mapAwardName(name, src) {
  var n = name.toLowerCase();
  // Cannes
  if (n.indexOf('palme') >= 0 || n.indexOf('grand prix') >= 0 && n.indexOf('palme') < 0) {
    if (n.indexOf('palme') >= 0) return "Palme d'Or";
    if (n.indexOf('grand prix') >= 0) return 'Grand Prix';
  }
  if (n.indexOf('director') >= 0 || n.indexOf('mise en scène') >= 0) return 'Best Director';
  if (n.indexOf('actress') >= 0 || n.indexOf('female') >= 0 || n.indexOf('féminine') >= 0) return 'Best Actress';
  if (n.indexOf('actor') >= 0 || n.indexOf('male') >= 0 || n.indexOf('masculine') >= 0) return 'Best Actor';
  if (n.indexOf('jury') >= 0 && n.indexOf('prize') >= 0) return 'Jury Prize';
  if (n.indexOf('screenplay') >= 0 || n.indexOf('script') >= 0) return 'Best Screenplay';
  if (n.indexOf('camera') >= 0) return 'Camera d\'Or';
  // Venice
  if (n.indexOf('golden lion') >= 0) return 'Golden Lion';
  if (n.indexOf('silver lion') >= 0) return 'Silver Lion';
  if (n.indexOf('volpi') >= 0) {
    if (n.indexOf('actress') >= 0 || n.indexOf('female') >= 0) return 'Best Actress';
    if (n.indexOf('actor') >= 0 || n.indexOf('male') >= 0) return 'Best Actor';
    return 'Volpi Cup';
  }
  if (n.indexOf('grand jury') >= 0 || n.indexOf('special jury') >= 0) return 'Grand Jury Prize';
  // Berlin
  if (n.indexOf('golden bear') >= 0) return 'Golden Bear';
  if (n.indexOf('silver bear') >= 0) {
    if (n.indexOf('director') >= 0) return 'Best Director';
    if (n.indexOf('actress') >= 0) return 'Best Actress';
    if (n.indexOf('actor') >= 0) return 'Best Actor';
    if (n.indexOf('jury') >= 0 || n.indexOf('grand prix') >= 0) return 'Silver Bear Jury';
    return 'Silver Bear';
  }
  // Oscars
  if (n.indexOf('best picture') >= 0 || n.indexOf('best motion picture') >= 0) return 'Best Picture';
  if (n.indexOf('best director') >= 0 || n.indexOf('best directing') >= 0) return 'Best Director';
  if (n.indexOf('best actor') >= 0 && n.indexOf('supporting') < 0) return 'Best Actor';
  if (n.indexOf('best actress') >= 0 && n.indexOf('supporting') < 0) return 'Best Actress';
  // Generic
  if (n.indexOf('best film') >= 0 || n.indexOf('best feature') >= 0) return 'Best Film';
  return null; // Unrecognized, skip
}

async function fetchFestivalAwards(src) {
  var fp = FESTIVAL_PAGES.find(function(f){ return f.src === src; });
  if (!fp) return [];
  var allItems = [];
  for (var y = 0; y < fp.years.length; y++) {
    var items = await fetchFestivalPage(src, fp.years[y]);
    allItems = allItems.concat(items);
  }
  return allItems;
}

// ===== FETCH AWARD =====
async function fetchAward(cfg, isBook) {
  var cacheKey = 'award_' + cfg.qid;
  var cached = cacheGet(cacheKey);
  if (cached) {
    debug('  award cache HIT ' + cfg.qid + ' len=' + cached.length);
    return cached;
  }

  var q = isBook ? buildBookQuery(cfg.qid) : buildMovieQuery(cfg.qid);
  debug('  calling runSparql for ' + cfg.qid);

  var rows;
  try { rows = await runSparql(q, 30000); } catch(e) {
    console.warn('SPARQL failed:', cfg.qid, e.message);
    throw e;
  }

  var items = [];
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var articleUrl = r.article ? r.article.value : null;
    items.push({
      title: r.itemLabel ? r.itemLabel.value : '',
      creator: r.creatorLabel ? r.creatorLabel.value : '',
      year: r.year ? r.year.value : '',
      source: cfg.src,
      award: cfg.award,
      wikiUrl: articleUrl,
      wikiTitle: wikiTitleFromUrl(articleUrl)
    });
  }

  var deduped = dedup(items);
  cacheSet(cacheKey, deduped, 86400000);
  return deduped;
}

function dedup(items) {
  var seen = {};
  for (var i = 0; i < items.length; i++) {
    var key = (items[i].title || items[i].creator || '') + '_' + (items[i].year || '');
    if (!key) continue;
    if (!seen[key]) { seen[key] = items[i]; }
    // Prefer entries with a title
    else if (items[i].title && !seen[key].title) { seen[key] = items[i]; }
  }
  var out = [];
  var keys = Object.keys(seen);
  for (var j = 0; j < keys.length; j++) { out.push(seen[keys[j]]); }
  out.sort(function(a,b){ return (b.year||'').localeCompare(a.year||''); });
  return out;
}

// ===== WIKIPEDIA ENRICH =====
async function enrich(items) {
  var cacheKey = 'wiki_enrich';
  var cached = cacheGet(cacheKey);
  var enrichMap = cached || {};

  // Get titles needing enrichment
  var toEnrich = [];
  for (var i = 0; i < items.length; i++) {
    var title = items[i].wikiTitle;
    if (title && !enrichMap[title]) toEnrich.push(title);
  }

  // Fetch in batches
  var batchSize = 6;
  for (var j = 0; j < toEnrich.length; j += batchSize) {
    var batch = toEnrich.slice(j, j + batchSize);
    var results = await Promise.all(batch.map(function(t){
      return getWikiSummary(t).then(function(d){
        if (d && d.extract) {
          enrichMap[t] = { extract: d.extract, thumb: d.thumbnail ? d.thumbnail.source : null, orig: d.originalimage ? d.originalimage.source : null };
        } else {
          enrichMap[t] = null;
        }
      }).catch(function(){ enrichMap[t] = null; });
    }));
  }

  cacheSet(cacheKey, enrichMap, 604800000); // 7d TTL

  for (var k = 0; k < items.length; k++) {
    var t = items[k].wikiTitle;
    if (t && enrichMap[t]) {
      items[k].extract = enrichMap[t].extract;
      items[k].thumbnail = enrichMap[t].thumb;
      items[k].originalimage = enrichMap[t].orig;
    }
  }
  return items;
}

// ===== MERGE/DEDUP =====
function normTitle(t) { return (t||'').toLowerCase().replace(/\([^)]*\)/g,'').replace(/[^a-z0-9一-鿿]/g,'').trim(); }

function mergeFilms(items) {
  var groups = {};
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var key = normTitle(it.title); // title only, cross-year dedup
    if (!key) continue;
    if (!groups[key]) {
      groups[key] = {
        title: it.title, creator: it.creator,
        year: it.year, // display year (latest)
        years: {},
        wikiUrl: it.wikiUrl, wikiTitle: it.wikiTitle,
        thumbnail: it.thumbnail, originalimage: it.originalimage, extract: it.extract,
        _type: it._type,
        awards: []
      };
    }
    // Merge better data
    if (!groups[key].thumbnail && it.thumbnail) groups[key].thumbnail = it.thumbnail;
    if (!groups[key].originalimage && it.originalimage) groups[key].originalimage = it.originalimage;
    if (!groups[key].extract && it.extract) groups[key].extract = it.extract;
    if (!groups[key].wikiTitle && it.wikiTitle) groups[key].wikiTitle = it.wikiTitle;
    if (!groups[key].wikiUrl && it.wikiUrl) groups[key].wikiUrl = it.wikiUrl;
    if (it.title && groups[key].title.length < it.title.length) groups[key].title = it.title;
    // Track years
    if (it.year) groups[key].years[it.year] = 1;
    // Keep latest year for display
    if (it.year && (!groups[key].year || it.year > groups[key].year)) groups[key].year = it.year;
    // Collect awards with year
    if (it.award) {
      var dup = false;
      for (var j = 0; j < groups[key].awards.length; j++) {
        if (groups[key].awards[j].source === it.source && groups[key].awards[j].award === it.award) { dup = true; break; }
      }
      if (!dup) groups[key].awards.push({source: it.source, award: it.award, year: it.year});
    }
  }
  var merged = [];
  var gkeys = Object.keys(groups);
  for (var k = 0; k < gkeys.length; k++) {
    var g = groups[gkeys[k]];
    g.yearList = Object.keys(g.years).sort(function(a,b){ return b.localeCompare(a); });
    merged.push(g);
  }
  merged.sort(function(a,b){ return (b.year||'').localeCompare(a.year||''); });
  return merged;
}

// ===== FETCH ALL =====
async function fetchAll(type) {
  var awards = type === 'movies' ? MOVIE_AWARDS : BOOK_AWARDS;
  var allItems = [];
  var failures = 0;

  if (type === 'movies') {
    // Fetch festival pages for full award lists (replaces person SPARQL)
    var doneSources = {};
    for (var f = 0; f < FESTIVAL_PAGES.length; f++) {
      var src = FESTIVAL_PAGES[f].src;
      try {
        var festItems = await fetchFestivalAwards(src);
        debug(type + ': festival page ' + src + ' = ' + festItems.length + ' items');
        for (var fj = 0; fj < festItems.length; fj++) { festItems[fj]._type = type; }
        allItems = allItems.concat(festItems);
        doneSources[src] = true;
      } catch(e) { failures++; debug(type + ': festival ' + src + ' FAILED: ' + e.message); }
    }
  }

  debug(type + ': fetching ' + awards.length + ' SPARQL awards');

  for (var i = 0; i < awards.length; i++) {
    try {
      var items = await fetchAward(awards[i], type === 'books');
      debug(type + ': [' + (i+1) + '/' + awards.length + '] ' + awards[i].src + ' ' + awards[i].award + ' = ' + items.length + ' items');
      for (var j = 0; j < items.length; j++) { items[j]._type = type; }
      allItems = allItems.concat(items);
    } catch(e) {
      failures++;
      console.error('Award fetch failed:', awards[i].qid, awards[i].src, e.message);
    }
  }

  // Merge/dedup films by title
  if (type === 'movies') {
    allItems = mergeFilms(allItems);
  }

  // Try enrich from Wikipedia (non-blocking)
  if (allItems.length > 0) { try { await enrich(allItems); } catch(e) {} }

  return { items: allItems, failures: failures, _count: allItems.length };
}

// ===== UI STATE =====
var state = { tab: 'movies', items: [], sourceFilter: 'all', yearFilter: 'all', search: '', loading: true, error: false, cacheAge: '', defaultLimit: 10 };
var favorites = {};
try { favorites = JSON.parse(localStorage.getItem('mbr_favorites') || '{}'); } catch(e) {}

function saveFavs() { localStorage.setItem('mbr_favorites', JSON.stringify(favorites)); }
function toggleFav(id) { favorites[id] = !favorites[id]; saveFavs(); renderCards(); }

function getItemId(item) { return (item._type||'') + '_' + (item.title||item.creator||'') + '_' + item.year; }

// ===== RENDER =====
function render() {
  document.getElementById('status-dot').className = state.loading ? 'status-dot loading' : (state.error ? 'status-dot error' : 'status-dot ok');
  document.getElementById('status-text').textContent = state.loading ? '加载中...' : (state.error ? '部分失败' : '已就绪' + (state.cacheAge ? ' · ' + state.cacheAge : ''));
  renderFilters();
  renderCards();
}

function getYears(items) {
  var years = {};
  for (var i = 0; i < items.length; i++) {
    if (items[i].yearList) {
      for (var y = 0; y < items[i].yearList.length; y++) { years[items[i].yearList[y]] = 1; }
    } else if (items[i].year) {
      years[items[i].year] = 1;
    }
  }
  return Object.keys(years).sort(function(a,b){ return b.localeCompare(a); });
}

function renderFilters() {
  var sources = {};
  for (var i = 0; i < state.items.length; i++) {
    var item = state.items[i];
    if (item.awards) {
      for (var a = 0; a < item.awards.length; a++) { sources[item.awards[a].source] = 1; }
    } else if (item.source) {
      sources[item.source] = 1;
    }
  }
  var srcKeys = Object.keys(sources);
  if (state.tab === 'books') srcKeys.sort();

  var html = '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">';
  // Source row
  html += '<span style="font-size:.75rem;color:var(--muted);margin-right:4px">来源</span>';
  html += '<button class="filter-chip' + (state.sourceFilter === 'all' ? ' active' : '') + '" data-filter="source" data-val="all">All</button>';
  for (var j = 0; j < srcKeys.length; j++) {
    html += '<button class="filter-chip' + (state.sourceFilter === srcKeys[j] ? ' active' : '') + '" data-filter="source" data-val="' + srcKeys[j] + '">' + srcKeys[j] + '</button>';
  }
  html += '</div>';

  // Year row
  var filtered = state.sourceFilter === 'all' ? state.items : state.items.filter(function(i){
    if (i.awards) {
      for (var a2 = 0; a2 < i.awards.length; a2++) { if (i.awards[a2].source === state.sourceFilter) return true; }
      return false;
    }
    return i.source === state.sourceFilter;
  });
  var years = getYears(filtered);
  html += '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:6px">';
  html += '<span style="font-size:.75rem;color:var(--muted);margin-right:4px">年份</span>';
  html += '<button class="filter-chip' + (state.yearFilter === 'all' ? ' active' : '') + '" data-filter="year" data-val="all">All</button>';
  for (var y = 0; y < years.length; y++) {
    html += '<button class="filter-chip' + (state.yearFilter === years[y] ? ' active' : '') + '" data-filter="year" data-val="' + years[y] + '">' + years[y] + '</button>';
  }
  html += '</div>';

  document.getElementById('filter-bar').innerHTML = html;
}

function renderCards() {
  var filtered = state.items;
  // Source filter (check awards array for merged items, or source field for unmerged)
  if (state.sourceFilter !== 'all') {
    filtered = filtered.filter(function(i){
      if (i.awards) {
        for (var a = 0; a < i.awards.length; a++) { if (i.awards[a].source === state.sourceFilter) return true; }
        return false;
      }
      return i.source === state.sourceFilter;
    });
  }
  // Year filter (check yearList for merged items, year for unmerged)
  if (state.yearFilter !== 'all') {
    filtered = filtered.filter(function(i){
      if (i.yearList) return i.yearList.indexOf(state.yearFilter) >= 0;
      return i.year === state.yearFilter;
    });
  }
  // Search
  if (state.search) {
    var q = state.search.toLowerCase();
    filtered = filtered.filter(function(i){
      return (i.title||'').toLowerCase().indexOf(q) >= 0 || (i.creator||'').toLowerCase().indexOf(q) >= 0;
    });
  }

  // Default: show 10 latest when both filters are "all"
  var showAll = !(state.sourceFilter === 'all' && state.yearFilter === 'all');
  if (!showAll && state.defaultLimit > 0) filtered = filtered.slice(0, state.defaultLimit);

  var container = document.getElementById('content');

  if (state.loading) {
    container.innerHTML = '<div class="loading-overlay"><div class="spinner"></div>Loading...</div>';
    return;
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">&#128218;</div><p>无结果</p><p class="muted">尝试调整筛选或搜索条件</p></div>';
    return;
  }

  var html = '<div class="card-grid">';
  for (var i = 0; i < filtered.length; i++) {
    var item = filtered[i];
    var id = getItemId(item);
    var isFav = favorites[id];
    var imgHtml;
    if (item.thumbnail) {
      imgHtml = '<img class="card-img" src="' + item.thumbnail + '" alt="" loading="lazy" onerror="this.className=\'card-img placeholder\';this.textContent=\'' + (item.title||item.creator||'') + '\'">';
    } else {
      imgHtml = '<div class="card-img placeholder">' + (item.title||item.creator||'') + '</div>';
    }
    html += '<div class="card" data-id="' + id + '" style="position:relative">' +
      '<button class="card-fav' + (isFav ? ' saved' : '') + '" data-fav="' + id + '" title="收藏">&#9733;</button>' +
      imgHtml +
      '<div class="card-body">' +
        '<div class="card-title">' + (item.title||item.creator||'') + '</div>' +
        (item.title && item.creator && item.title !== item.creator ? '<div class="card-sub">' + item.creator + '</div>' : '') +
        '<div class="card-badges">' +
          (item.yearList && item.yearList.length > 1 ? '<span class="badge">' + item.yearList[item.yearList.length-1] + '–' + item.yearList[0] + '</span>' : (item.year ? '<span class="badge">' + item.year + '</span>' : '')) +
          (item.awards
            ? (item.awards.length > 1
                ? '<span class="badge" style="background:var(--accent);color:#fff">' + item.awards.length + ' awards</span>'
                : item.awards.map(function(a){ return '<span class="badge">' + a.source + ' · ' + a.award + '</span>'; }).join(''))
            : (item.source ? '<span class="badge">' + item.source + ' · ' + item.award + '</span>' : '')) +
        '</div>' +
      '</div>' +
    '</div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

function showModal(item) {
  var id = getItemId(item);
  var isFav = favorites[id];
  var imgHtml = item.originalimage ? '<img class="modal-img" src="' + item.originalimage + '" alt="">' : (item.thumbnail ? '<img class="modal-img" src="' + item.thumbnail + '" alt="">' : '');
  var wikiLink = item.wikiUrl ? '<a class="btn external" href="' + item.wikiUrl + '" target="_blank">Wikipedia →</a>' : '';
  var html = '<div class="modal-overlay" id="modal-overlay"><div class="modal">' +
    '<button class="modal-close" id="modal-close">&times;</button>' +
    imgHtml +
    '<div class="modal-body">' +
      '<h2>' + (item.title||item.creator||'') + '</h2>' +
      '<div class="meta">' + (item.title && item.creator && item.title !== item.creator ? item.creator + ' · ' : '') + (item.yearList ? item.yearList.join(', ') : (item.year||'')) + '</div>' +
      (item.awards ? '<div class="card-badges" style="margin-bottom:12px">' + item.awards.map(function(a){ return '<span class="badge">' + a.source + ' · ' + a.award + '</span>'; }).join(' ') + '</div>' : (item.source ? '<div class="card-badges" style="margin-bottom:12px"><span class="badge">' + item.source + ' · ' + item.award + '</span></div>' : '')) +
      (item.extract ? '<div class="summary">' + item.extract.substring(0, 600) + '...</div>' : '') +
      '<div class="modal-actions">' +
        '<button class="btn primary" id="modal-fav">' + (isFav ? '★ 已收藏' : '☆ 收藏') + '</button>' +
        wikiLink +
      '</div>' +
    '</div>' +
  '</div></div>';
  document.getElementById('modal-container').innerHTML = html;

  document.getElementById('modal-close').onclick = function(){ document.getElementById('modal-container').innerHTML = ''; };
  document.getElementById('modal-overlay').onclick = function(e){ if (e.target === this) document.getElementById('modal-container').innerHTML = ''; };
  document.getElementById('modal-fav').onclick = function(){ toggleFav(id); showModal(item); };
}

// ===== DATA STORE =====
var dataStore = { movies: null, books: null };

async function loadData(type, forceRefresh) {
  var cacheKey = 'full_' + type;
  var cacheTTL = 3600000; // 1h
  debug('loadData: ' + type + ' force=' + (forceRefresh||false));

  if (!forceRefresh) {
    var cached = cacheGet(cacheKey);
    if (cached) {
      debug(type + ': cache hit, ' + (cached.items ? cached.items.length : 0) + ' items');
      dataStore[type] = cached;
      if (type === state.tab) {
        state.items = cached.items;
        state.loading = false;
        state.cacheAge = '缓存';
        render();
      }
      // Background refresh if cache older than half TTL
      if (Date.now() - cached._ts > cacheTTL / 2) {
        refreshInBackground(type, cacheKey, cacheTTL);
      }
      return;
    }
  }

  state.loading = true;
  render();
  debug(type + ': fetching fresh data...');

  try {
    dataStore[type] = await fetchAll(type);
    debug(type + ': got ' + (dataStore[type].items ? dataStore[type].items.length : 0) + ' items, ' + dataStore[type].failures + ' failures');
    dataStore[type]._ts = Date.now();
    if (dataStore[type].items.length > 0) {
      cacheSet(cacheKey, dataStore[type], cacheTTL);
    } else {
      debug(type + ': WARNING not caching empty result');
    }
    if (type === state.tab) {
      state.items = dataStore[type].items;
      state.loading = false;
      state.error = dataStore[type].failures > 0;
      state.cacheAge = '实时';
      render();
    }
  } catch(e) {
    debug(type + ': fetch failed - ' + e.message);
    if (dataStore[type]) {
      if (type === state.tab) document.getElementById('banner').innerHTML = '<div class="banner warn">实时更新失败，显示缓存</div>';
    } else if (type === state.tab) {
      state.loading = false;
      state.error = true;
      render();
      document.getElementById('banner').innerHTML = '<div class="banner warn">无法加载数据，请检查网络</div>';
    }
  }
}

async function refreshInBackground(type, cacheKey, ttl) {
  try {
    var fresh = await fetchAll(type);
    fresh._ts = Date.now();
    cacheSet(cacheKey, fresh, ttl);
    dataStore[type] = fresh;
    if (type === state.tab) {
      state.items = fresh.items;
      state.cacheAge = '实时';
      render();
    }
  } catch(e) {}
}

async function refreshCurrent() {
  document.getElementById('banner').innerHTML = '';
  await loadData(state.tab, true);
}

if (window.__TEST_DATA__) {
  // Offline mode: use embedded test data, skip API calls

    debugEl = document.getElementById('debug');

    dataStore.books = window.__TEST_DATA__.books;
    state.items = dataStore[state.tab].items;
    state.loading = false;
    render();
  };
} else {
  // Live mode: full init with API calls

// ===== INIT =====
async function init() {
  debugEl = document.getElementById('debug');
  debug('Init started');
  render();
  debug('Loading movies and books in parallel...');
  try {
    await Promise.all([loadData('movies'), loadData('books')]);
    // Data loaded, hide debug panel
    debugEl.style.display = 'none';
  } catch(e) {
    debug('FATAL: ' + e.message + ' ' + (e.stack||''));
  }
}

// ===== EVENT HANDLERS =====
document.getElementById('filter-bar').addEventListener('click', function(e){
  if (e.target.classList.contains('filter-chip')) {
    var ftype = e.target.dataset.filter;
    var val = e.target.dataset.val;
    if (ftype === 'source') {
      state.sourceFilter = val;
      state.yearFilter = 'all';
    } else if (ftype === 'year') {
      state.yearFilter = val;
    }
    renderFilters();
    renderCards();
  }
});

document.getElementById('search').addEventListener('input', function(){
  state.search = this.value;
  renderCards();
});

document.getElementById('content').addEventListener('click', function(e){
  var card = e.target.closest('.card');
  var favBtn = e.target.closest('.card-fav');
  if (favBtn) {
    e.stopPropagation();
    toggleFav(favBtn.dataset.fav);
    return;
  }
  if (card) {
    var id = card.dataset.id;
    var item = state.items.find(function(i){ return getItemId(i) === id; });
    if (item) showModal(item);
  }
});

document.getElementById('theme-btn').addEventListener('click', function(){
  document.body.classList.toggle('light');
  this.textContent = document.body.classList.contains('light') ? '☽' : '☀';
});
document.getElementById('refresh-btn').addEventListener('click', function(){
  refreshCurrent();
});
document.getElementById('export-btn').addEventListener('click', function(){
  var data = { movies: dataStore.movies, books: dataStore.books };
  var blob = new Blob(['window.__TEST_DATA__ = ' + JSON.stringify(data, null, 2) + ';'], {type: 'text/javascript'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'test-data.js';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
});

document.querySelector('.tabs').addEventListener('click', function(e){
  if (e.target.classList.contains('tab')) {
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    e.target.classList.add('active');
    state.tab = e.target.dataset.tab;
    state.sourceFilter = 'all';
    state.yearFilter = 'all';
    state.search = '';
    document.getElementById('search').value = '';
    document.getElementById('banner').innerHTML = '';

    if (dataStore[state.tab]) {
      state.items = dataStore[state.tab].items;
      state.loading = false;
      state.cacheAge = dataStore[state.tab]._ts ? '缓存' : '';
    } else {
      state.loading = true;
      loadData(state.tab);
    }
    render();
  }
});

init();
} // close else block for test data mode
