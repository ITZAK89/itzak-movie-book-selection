<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>图书奖项测试</title>
<style>
body{font:14px -apple-system,sans-serif;background:#111;color:#eee;padding:20px}
h2{color:#6c8cff;margin-top:24px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card{background:#222;border-radius:8px;overflow:hidden}
.card img{width:100%;height:280px;object-fit:cover;background:#333}
.card-body{padding:10px}.card-body h3{margin:0 0 4px;font-size:.9rem}
.card-body p{margin:0;font-size:.75rem;color:#aaa}.err{color:#f44336}.stat{color:#4caf50}
</style></head><body>
<select id="sel" style="font-size:16px;padding:8px;margin-bottom:12px;background:#333;color:#fff;border:1px solid #555"></select>
<button id="go" style="font-size:16px;padding:8px 16px;margin-left:8px;background:#6c8cff;color:#fff;border:none;border-radius:4px;cursor:pointer">Go</button>
<div id="out"></div>
<script>
var AWARDS = [
  {src:'Booker Prize',award:'Winner',page:'Booker_Prize',type:'work', yearCol:0, authorCol:1, titleCol:2},
  {src:'Nobel Literature',award:'Laureate',page:'List_of_Nobel_laureates_in_Literature',type:'person', yearCol:0, authorCol:1, titleCol:-1, subAuthor:true},
  {src:'Pulitzer Fiction',award:'Winner',page:'Pulitzer_Prize_for_Fiction',type:'work', yearCol:0, authorCol:1, titleCol:2},
  {src:'Intl Booker',award:'Winner',page:'International_Booker_Prize',type:'work', yearCol:0, authorCol:1, titleCol:-1},
  {src:'National Book Award',award:'Winner',page:'National_Book_Award_for_Fiction',type:'work', yearCol:0, authorCol:1, titleCol:2, rowspanYear:true, winnerBg:true},
  {src:"Women's Prize",award:'Winner',page:"List_of_Women%27s_Prize_for_Fiction_winners",type:'work', yearCol:0, authorCol:1, titleCol:2},
  {src:'PEN/Faulkner',award:'Winner',page:'PEN/Faulkner_Award_for_Fiction',type:'work', yearCol:0, authorCol:1, titleCol:2},
  {src:'Costa Book Award',award:'Winner',page:'Costa_Book_Awards',type:'work', yearCol:0, authorCol:1, titleCol:2}
];

async function fetchPage(pageName) {
  var url = 'https://en.wikipedia.org/w/api.php?origin=*&action=parse&page=' + pageName + '&prop=text&format=json';
  var r = await fetch(url); var d = await r.json();
  return d.parse.text['*'];
}

function cleanText(s) { return s.replace(/\[.*?\]/g,"").replace(/[§*]/g,"").trim(); }

function parseBookTable(html, cfg) {
  var doc = new DOMParser().parseFromString(html, "text/html");
  var rawTableCount = (html.match(/<table/gi) || []).length;
  var tables = doc.querySelectorAll("table.wikitable, table.sortable, table");
  console.log('parseBookTable: DOM tables=' + tables.length + ' raw <table> tags=' + rawTableCount);
  // Search raw HTML for 2025
  var idx2025 = html.indexOf('2025');
  if (idx2025 >= 0) console.log('Found "2025" in raw HTML at pos ' + idx2025 + ': ...' + html.substring(Math.max(0,idx2025-50), idx2025+100) + '...');
  else console.log('"2025" NOT found in raw HTML');
  var all = [];
  for (var t = 0; t < tables.length; t++) {
    var rows = tables[t].querySelectorAll("tr");
    if (rows.length < 2) continue;
    var headerCells = rows[0].querySelectorAll("th");
    var headers = [], headerImgs = [], colSpans = [];
    for (var h = 0; h < headerCells.length; h++) {
      headers.push(headerCells[h].textContent.trim().toLowerCase());
      headerImgs.push(headerCells[h].querySelector("img") !== null);
      colSpans.push(parseInt(headerCells[h].getAttribute("colspan") || "1"));
    }
    var subHeaders = [];
    if (rows.length > 1) {
      var row1Cells = rows[1].querySelectorAll("th");
      if (row1Cells.length > 0) {
        for (var sh = 0; sh < row1Cells.length; sh++) {
          subHeaders.push(row1Cells[sh].textContent.trim().toLowerCase());
        }
      }
    }
    var yearCol = cfg.yearCol, authorCol = cfg.authorCol, titleCol = cfg.titleCol;
    // Nobel: find "name" sub-header to locate actual author column
    if (cfg.subAuthor && subHeaders.length > 0) {
      for (var sc = 0; sc < subHeaders.length; sc++) {
        if (subHeaders[sc] === "name") { authorCol = yearCol + 1 + sc; break; }
      }
    }
    // Intl Booker: auto-detect title column from headers (varies by table)
    if (titleCol < 0) {
      for (var c = 0; c < headers.length; c++) {
        var ht = headers[c];
        if (!headerImgs[c] && c !== authorCol && (ht === "title" || ht === "work" || ht === "novel" || ht === "book")) { titleCol = c; break; }
      }
    }
    // Skip non-data tables: first column header must contain "year"
    if (headers.length > 0 && yearCol < headers.length && headers[yearCol].indexOf("year") < 0) { console.log('Table ' + t + ': FILTERED (header="' + headers[yearCol] + '")'); continue; }

    console.log('Table ' + t + ': headers=' + JSON.stringify(headers) + ' subHeaders=' + JSON.stringify(subHeaders));
    console.log('  yearCol=' + yearCol + ' authorCol=' + authorCol + ' titleCol=' + titleCol);

    var rowCount = 0, skippedYear = 0, skippedEmpty = 0;
    var pendingYear = '', pendingRowspan = 0;
    for (var r = 1; r < rows.length; r++) {
      var cells = rows[r].querySelectorAll("td,th");
      // Check for year-only rows (NBA-style rowspan year)
      if (cfg.rowspanYear && cells.length === 1 && cells[0].tagName === 'TH') {
        var thText = cells[0].textContent.replace(/\[.*?\]/g,"").trim();
        var thYm = thText.match(/^(\d{4})/);
        if (thYm && parseInt(thYm[1]) >= 1990) {
          pendingYear = thYm[1];
          pendingRowspan = parseInt(cells[0].getAttribute("rowspan") || "1");
        }
        continue;
      }
      if (cells.length < 2) continue;
      var yearText;
      // Use pending year if available, otherwise read from yearCol
      if (pendingYear && pendingRowspan > 0) {
        yearText = pendingYear;
        pendingRowspan--;
        if (pendingRowspan <= 0) pendingYear = '';
      } else {
        yearText = (cells[yearCol] || cells[0]).textContent.replace(/\[.*?\]/g,"").trim();
      }
      var ym = yearText.match(/^(\d{4})/);
      if (!ym || parseInt(ym[1]) < 1990) { skippedYear++; continue; }
      var year = ym[1];
      // When year comes from rowspan, columns are shifted left by 1
      var effAuthorCol = (pendingYear && pendingRowspan > 0) ? authorCol - 1 : authorCol;
      var effTitleCol = (pendingYear && pendingRowspan > 0) ? titleCol - 1 : titleCol;
      var author = effAuthorCol >= 0 && cells[effAuthorCol] ? cleanText(cells[effAuthorCol].textContent) : "";
      var title = "";
      if (effTitleCol >= 0 && cells[effTitleCol] && effTitleCol !== effAuthorCol) {
        if (!cells[effTitleCol].querySelector("img")) {
          title = cleanText(cells[effTitleCol].textContent);
        }
      }
      // If titleCol has images (flags), don't search alternatives — treat as person below
      // Winner background detection (NBA-style)
      if (cfg.winnerBg) {
        var rowIsWinner = (rows[r].getAttribute("style")||"").indexOf("background") >= 0;
        if (!rowIsWinner) {
          for (var wc = 0; wc < cells.length; wc++) {
            if ((cells[wc].getAttribute("style")||"").indexOf("background") >= 0) { rowIsWinner = true; break; }
          }
        }
        if (!rowIsWinner) { skippedEmpty++; continue; }
      }
      if (!author && !title) { skippedEmpty++; continue; }
      // If no title found but author exists, treat as person entry
      var linkFromAuthor = false;
      if (!title && author) { title = author; author = ''; linkFromAuthor = true; }
      var wpTitle = null;
      var linkCell;
      if (linkFromAuthor) { linkCell = effAuthorCol >= 0 && cells[effAuthorCol] ? cells[effAuthorCol] : null; }
      else { linkCell = title && effTitleCol >= 0 && cells[effTitleCol] ? cells[effTitleCol] : (effAuthorCol >= 0 ? cells[effAuthorCol] : null); }
      if (linkCell) {
        var link = linkCell.querySelector("a[href^=\"/wiki/\"]");
        if (link) wpTitle = decodeURIComponent(link.getAttribute("href").replace("/wiki/",""));
      }
      if (rowCount < 3 || year === '2025' || pendingYear === '2025') {
        var rawCells = [];
        for (var dbg = 0; dbg < Math.min(cells.length, 6); dbg++) {
          rawCells.push('[' + dbg + ']' + cells[dbg].tagName + ':' + cells[dbg].textContent.trim().substring(0, 50));
        }
        console.log('  DEBUG r=' + r + ' t=' + t + ' pendingY=' + pendingYear + ' y=' + year + ' a=' + (author||'').substring(0,20) + ' t=' + (title||'').substring(0,20) + ' cells=' + rawCells.join(' | '));
      }
      all.push({title: title, creator: author, year: year, wikiTitle: wpTitle, thumb: null});
      rowCount++;
    }
    console.log('  rows=' + rowCount + ' skipped: year=' + skippedYear + ' empty=' + skippedEmpty);
  }
  console.log('Total=' + all.length);
  return all;
}

async function getPoster(wpTitle) {
  if (!wpTitle) return null;
  try {
    var r = await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(wpTitle));
    if (r.ok) { var d = await r.json(); if (d.thumbnail) return d.thumbnail.source; }
    return null;
  } catch(e) { return null; }
}

async function runOne(idx) {
  var out = document.getElementById('out');
  var award = AWARDS[idx];
  out.innerHTML = '<p>Fetching ' + award.src + ' ' + award.award + '... (' + award.page + ')</p>';
  var html;
  try { html = await fetchPage(award.page); } catch(e) { out.innerHTML += '<p class="err">FETCH ERROR: ' + e.message + '</p>'; return; }
  if (!html) { out.innerHTML += '<p class="err">No HTML returned</p>'; return; }
  out.innerHTML += '<p>HTML: ' + html.length + ' bytes</p>';

  var rows = parseBookTable(html, award);

  // Handle person type
  if (award.type === 'person') {
    for (var i = 0; i < rows.length; i++) {
      rows[i].title = rows[i].creator;
      rows[i].creator = '';
    }
    out.innerHTML += '<p class="stat">Type: person — ' + rows.length + ' laureates (1990-)</p>';
  } else {
    out.innerHTML += '<p class="stat">Type: work — ' + rows.length + ' books (1990-)</p>';
  }

  out.innerHTML += '<p>Loading posters...</p>';
  for (var i = 0; i < rows.length; i += 6) {
    var batch = rows.slice(i, i + 6);
    await Promise.all(batch.map(async function(r) {
      r.thumb = await getPoster(r.wikiTitle);
    }));
  }
  var ok = rows.filter(function(r){ return r.thumb; }).length;
  out.innerHTML += '<p class="stat">Posters: ' + ok + '/' + rows.length + '</p>';

  // Data table
  out.innerHTML += '<h2>' + award.src + ' — ' + award.award + '</h2>';
  out.innerHTML += '<table style="border-collapse:collapse;width:100%"><tr><th style="border:1px solid #555;padding:4px">Year</th><th style="border:1px solid #555;padding:4px">Title</th><th style="border:1px solid #555;padding:4px">Creator</th></tr>';
  for (var j = 0; j < rows.length; j++) {
    out.innerHTML += '<tr><td style="border:1px solid #333;padding:4px">' + rows[j].year + '</td><td style="border:1px solid #333;padding:4px">' + rows[j].title + '</td><td style="border:1px solid #333;padding:4px">' + rows[j].creator + '</td></tr>';
  }
  out.innerHTML += '</table>';

  // Cards
  out.innerHTML += '<h2>Cards</h2><div class="grid">';
  for (var k = 0; k < rows.length; k++) {
    var r = rows[k];
    out.innerHTML += '<div class="card">' +
      (r.thumb ? '<img src="' + r.thumb + '" loading="lazy" onerror="this.style.display=\'none\'">' :
       '<div style="height:280px;display:flex;align-items:center;justify-content:center;background:#333;color:#666;font-size:.8rem;text-align:center;padding:10px">' + (r.title||r.creator) + '</div>') +
      '<div class="card-body"><h3>' + (r.title||r.creator) + '</h3><p>' + r.year + (r.creator ? ' · ' + r.creator : '') + '</p></div></div>';
  }
  out.innerHTML += '</div>';
}

var sel = document.getElementById('sel');
for (var i = 0; i < AWARDS.length; i++) {
  sel.innerHTML += '<option value="' + i + '">' + AWARDS[i].src + ' — ' + AWARDS[i].award + '</option>';
}
sel.value = '3'; // Default to Intl Booker
document.getElementById('go').onclick = function() { runOne(parseInt(sel.value)); };
</script>
</body></html>
