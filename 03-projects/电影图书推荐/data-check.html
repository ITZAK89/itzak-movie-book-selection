<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>数据检查</title>
<style>body{font:14px monospace;background:#111;color:#eee;padding:20px}
h2{color:#6c8cff}table{border-collapse:collapse;margin:10px 0;width:100%}
td,th{border:1px solid #333;padding:4px 8px;text-align:left}
th{color:#aaa}.ok{color:#4caf50}.err{color:#f44336}</style></head><body>
<div id="out"></div>
<script>
var pages = [
  {name:'Palme d\'Or', page:'Palme_d%27Or', src:'Cannes'},
];

async function fetchTable(pageName) {
  var url = 'https://en.wikipedia.org/w/api.php?origin=*&action=parse&page=' + pageName + '&prop=text&format=json';
  var r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  var d = await r.json();
  return d.parse.text['*'];
}

function parseWinners(html, name) {
  var doc = new DOMParser().parseFromString(html, 'text/html');
  var tables = doc.querySelectorAll('table.wikitable');
  var allRows = [];

  for (var t = 0; t < tables.length; t++) {
    var rows = tables[t].querySelectorAll('tr');
    if (rows.length < 3) continue;

    // Auto-detect columns from header row
    var headers = [];
    var ths = rows[0].querySelectorAll('th');
    for (var h = 0; h < ths.length; h++) headers.push(ths[h].textContent.trim().toLowerCase());

    var yearCol = 0, filmCol = 1, directorCol = -1;
    for (var c = 0; c < headers.length; c++) {
      var ht = headers[c];
      if (ht.indexOf('year') >= 0 || ht.indexOf('année') >= 0) yearCol = c;
      if (ht.indexOf('english') >= 0 || ht.indexOf('film') >= 0) filmCol = c;
      if (ht.indexOf('director') >= 0 || ht.indexOf('réalisateur') >= 0) directorCol = c;
      if (ht.indexOf('recipient') >= 0 || ht.indexOf('winner') >= 0) { directorCol = c; if (filmCol === 1) filmCol = -1; } // For actor awards
    }
    if (filmCol < 0) filmCol = (headers.length >= 2 ? 1 : 0);
    if (directorCol < 0) directorCol = (headers.length >= 3 ? 2 : 1);
    console.log('  Headers[' + t + ']: ' + headers.join(' | ') + ' => year=' + yearCol + ' film=' + filmCol + ' dir=' + directorCol);
    // For acting awards without director: use column 1 as actor, column 2 as film
    if (name.indexOf('Actor') >= 0 || name.indexOf('Actress') >= 0) {
      filmCol = headers.length >= 3 ? 2 : 1;
      directorCol = 1; // This becomes "actor/actress name"
    }

    var prevYear = '';

    for (var r = 1; r < rows.length; r++) {
      var cells = rows[r].querySelectorAll('td,th');
      if (cells.length < 2) continue;

      var firstCell = cells[0].textContent.replace(/\[.*?\]/g,'').trim();
      var shift = 0, year;

      if (/^\d{4}$/.test(firstCell) && parseInt(firstCell) >= 1990) {
        year = firstCell; prevYear = year;
      } else if (prevYear) {
        year = prevYear; shift = 1;
      } else {
        continue;
      }

      // DOM layout: Year(0) | Title(1) | Director(2) | Country(3) | Ref(4)
      // Original Title is INSIDE cell[1], not a separate column
      // Country/Ref may be missing due to rowspan
      // shift=1 when year is missing (rowspan)
      var fi = 1 - shift, di = 2 - shift;
      if (fi < 0) fi = 0; if (di < 0) di = 0;

      var film = (fi < cells.length) ? cells[fi].textContent.replace(/\[.*?\]/g,'').replace(/\s+/g,' ').trim() : '';
      if (!film) continue;

      var director = (di < cells.length) ? cells[di].textContent.replace(/\[.*?\]/g,'').trim() : '';

      allRows.push({year: parseInt(year), film: film, director: director});
    }
  }
  return allRows;
}

async function run() {
  var out = document.getElementById('out');
  out.innerHTML = '<p>Fetching 6 Cannes award pages...</p>';
  for (var i = 0; i < pages.length; i++) {
    var p = pages[i];
    out.innerHTML += '<p>Fetching ' + p.name + '...</p>';
    try {
      var html = await fetchTable(p.page);
      var rows = parseWinners(html, p.name);
      out.innerHTML += '<p class="ok">Got ' + rows.length + ' rows (1990+)</p>';
      out.innerHTML += '<h2>' + p.name + ' (' + rows.length + ' winners 1990-)</h2>';
      out.innerHTML += '<table><tr><th>Year</th><th>Film</th><th>Director</th></tr>';
      for (var j = 0; j < rows.length; j++) {
        out.innerHTML += '<tr><td>' + rows[j].year + '</td><td>' + rows[j].film + '</td><td>' + rows[j].director + '</td></tr>';
      }
      out.innerHTML += '</table>';
    } catch(e) {
      out.innerHTML += '<p class="err">Error: ' + e.message + '</p>';
    }
  }
  out.innerHTML += '<p>Done.</p>';
}
run();
</script></body></html>
