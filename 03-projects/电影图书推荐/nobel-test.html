<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>Nobel Test</title>
<style>
body{font:14px -apple-system,sans-serif;background:#111;color:#eee;padding:20px}
h2{color:#6c8cff;margin-top:16px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.card{background:#222;border-radius:8px;overflow:hidden}
.card img{width:100%;height:260px;object-fit:cover;background:#333}
.card-body{padding:10px}.card-body h3{margin:0 0 4px;font-size:.9rem}
.card-body p{margin:0;font-size:.75rem;color:#aaa}
.err{color:#f44336}.stat{color:#4caf50}.debug{font:12px monospace;margin-bottom:16px;max-height:500px;overflow-y:auto;background:#1a1a1a;padding:12px;border-radius:8px;white-space:pre-wrap}
</style></head><body>
<h1>Nobel Literature — Parse Test</h1>
<div class="debug" id="debug"></div>
<h2>Results (<span id="count">0</span>)</h2>
<div class="grid" id="grid"></div>
<script>
var PAGE = 'List_of_Nobel_laureates_in_Literature';

function log(msg) { document.getElementById('debug').textContent += msg + '\n'; }

function cleanText(s) { return s.replace(/\[.*?\]/g,"").replace(/[§*]/g,"").trim(); }

async function fetchPage(pageName) {
  var url = 'https://en.wikipedia.org/w/api.php?origin=*&action=parse&page=' + pageName + '&prop=text&format=json';
  var r = await fetch(url); var d = await r.json();
  return d.parse.text['*'];
}

async function getPoster(wpTitle) {
  if (!wpTitle) return null;
  try {
    var r = await fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(wpTitle));
    if (r.ok) { var d = await r.json(); if (d.thumbnail) return d.thumbnail.source; }
    return null;
  } catch(e) { return null; }
}

function parseTable(html) {
  var doc = new DOMParser().parseFromString(html, "text/html");
  var tables = doc.querySelectorAll("table.wikitable, table.sortable, table");
  log('Tables found: ' + tables.length);
  var all = [];
  for (var t = 0; t < tables.length; t++) {
    var rows = tables[t].querySelectorAll("tr");
    if (rows.length < 2) continue;
    var headerCells = rows[0].querySelectorAll("th");
    var headers = [], headerImgs = [], colSpans = [];
    for (var h = 0; h < headerCells.length; h++) {
      headers.push(headerCells[h].textContent.trim().toLowerCase());
      headerImgs.push(headerCells[h].querySelector("img") !== null);
      colSpans.push(parseInt(headerCells[h].getAttribute("colspan") || "1"));
    }
    var subHeaders = [];
    if (rows.length > 1) {
      var row1Cells = rows[1].querySelectorAll("th");
      if (row1Cells.length > 0) {
        for (var sh = 0; sh < row1Cells.length; sh++) {
          subHeaders.push(row1Cells[sh].textContent.trim().toLowerCase());
        }
      }
    }
    var yearCol = -1, authorCol = -1, titleCol = -1;
    for (var c = 0; c < headers.length; c++) {
      var ht = headers[c];
      if (yearCol < 0 && (ht.indexOf("year") >= 0 || ht === "year")) yearCol = c;
      if (authorCol < 0 && !headerImgs[c] && (ht.indexOf("author") >= 0 || ht.indexOf("writer") >= 0 || ht.indexOf("laureate") >= 0 || ht.indexOf("recipient") >= 0 || ht.indexOf("winner") >= 0)) {
        authorCol = c;
        if (colSpans[c] >= 2 && subHeaders.length > 0) {
          for (var sc = 0; sc < subHeaders.length; sc++) {
            if (subHeaders[sc] === "name") { authorCol = c + sc; break; }
          }
        }
      }
      if (titleCol < 0 && !headerImgs[c] && (ht === "title" || ht === "work" || ht === "novel" || ht === "book")) titleCol = c;
    }
    if (yearCol < 0) yearCol = 0;
    if (authorCol < 0 && headers.length >= 2) authorCol = 1;
    if (titleCol < 0 && headers.length >= 3) titleCol = 2;

    log('Table ' + t + ': headers=' + JSON.stringify(headers));
    log('  subHeaders=' + JSON.stringify(subHeaders) + ' yearCol=' + yearCol + ' authorCol=' + authorCol + ' titleCol=' + titleCol);

    var rowCount = 0, skipped = 0;
    // Log rows around year boundary
    for (var r = 1; r < rows.length; r++) {
      var cells = rows[r].querySelectorAll("td,th");
      if (cells.length < 2) continue;
      var rawFirst = cells[yearCol] ? cells[yearCol].textContent.replace(/\[.*?\]/g,"").trim() : '';
      var ym = rawFirst.match(/^(\d{4})/);
      var year = ym ? ym[1] : '';
      var isSubHeader = (cells[0].tagName === 'TH' || cells[1].tagName === 'TH');

      // Log rows near 2013 boundary + every 50th row
      if ((year >= 2010 && year <= 2016) || r % 50 === 0) {
        log('  r=' + r + (isSubHeader?' [SUBHEADER]':'') + ' firstCell="' + rawFirst.substring(0,30) + '" year=' + year + ' cellsLen=' + cells.length);
      }

      if (!ym || parseInt(ym[1]) < 1990) { skipped++; continue; }

      var author = authorCol >= 0 && cells[authorCol] ? cleanText(cells[authorCol].textContent) : "";
      var title = "";
      if (titleCol >= 0 && cells[titleCol] && titleCol !== authorCol) {
        if (!cells[titleCol].querySelector("img")) {
          title = cleanText(cells[titleCol].textContent);
        }
      }
      if (!title && titleCol >= 0 && cells[titleCol] && cells[titleCol].querySelector("img")) {
        for (var ac = 0; ac < cells.length; ac++) {
          if (ac === yearCol || ac === authorCol || ac === titleCol) continue;
          if (!cells[ac].querySelector("img") && cells[ac].textContent.trim()) {
            title = cleanText(cells[ac].textContent);
            titleCol = ac;
            break;
          }
        }
      }
      if (!author && !title) { skipped++; continue; }
      var wpTitle = null;
      var linkCell = title && titleCol >= 0 && cells[titleCol] ? cells[titleCol] : (authorCol >= 0 ? cells[authorCol] : null);
      if (linkCell) {
        var link = linkCell.querySelector("a[href^=\"/wiki/\"]");
        if (link) wpTitle = decodeURIComponent(link.getAttribute("href").replace("/wiki/",""));
      }
      all.push({title: title, creator: author, year: year, wikiTitle: wpTitle, thumb: null});
      rowCount++;
    }
    log('  rows=' + rowCount + ' skipped=' + skipped);
  }
  log('Total=' + all.length);
  return all;
}

(async function(){
  log('Fetching: ' + PAGE);
  var html = await fetchPage(PAGE);
  log('HTML: ' + html.length + ' bytes\n');

  var items = parseTable(html);

  for (var i = 0; i < items.length; i++) {
    items[i].title = items[i].creator;
    items[i].creator = '';
  }

  log('\n--- Items by year ---');
  for (var i = 0; i < items.length; i++) {
    log(items[i].year + ' ' + items[i].title);
  }

  log('\n--- Fetching posters (first 12) ---');
  var limit = Math.min(12, items.length);
  for (var i = 0; i < limit; i++) {
    if (items[i].wikiTitle) {
      items[i].thumb = await getPoster(items[i].wikiTitle);
      log((items[i].thumb ? 'OK' : 'NO') + ' ' + items[i].year + ' ' + items[i].title);
    }
  }

  document.getElementById('count').textContent = items.length;
  var html2 = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var img = it.thumb ? '<img src="' + it.thumb + '" alt="">' : '<div style="height:260px;display:flex;align-items:center;justify-content:center;color:#888;background:#333">' + it.title + '</div>';
    html2 += '<div class="card"><a href="https://en.wikipedia.org/wiki/' + (it.wikiTitle||'') + '" target="_blank">' + img + '</a><div class="card-body"><h3>' + it.title + '</h3><p>' + it.year + '</p></div></div>';
  }
  document.getElementById('grid').innerHTML = html2;
  log('\n=== DONE ===');
})();
</script>
</body></html>
